#vBtn{position:fixed;top:15px;left:15px;z-index:10;padding:5px 11px;border-radius:3px;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);color:rgba(180,210,255,.55);

let actx=null,aN=[],sndOn=false,wNoise=null,_mComp=null;
// Isochronic brainwave targets per chakra (Hz)
const ISO_HZ=[2,6,8,10,12,40,40];

const iA=()=>{
  if(!actx){
    actx=new(AudioContext||webkitAudioContext)();
    _mComp=actx.createDynamicsCompressor();
    _mComp.threshold.value=-20; _mComp.knee.value=6;
    _mComp.ratio.value=10; _mComp.attack.value=0.003; _mComp.release.value=0.25;
    _mComp.connect(actx.destination);
  }
};

// Stop all chakra tones (not water)
const stopA=()=>{
  const t=actx?actx.currentTime:0;
  aN.forEach(({o,g,sp})=>{
    try{g.gain.linearRampToValueAtTime(0,t+1.2)}catch(e){}
    setTimeout(()=>{try{o&&o.stop()}catch(e){}try{sp&&sp.stop()}catch(e){}},1300);
  });
  aN=[];
};

// Brown noise: generate buffer, each sample = prev*0.997 + white*0.003
// Then HP filter at 40Hz to remove DC, LP at 800Hz to keep warmth.
const makeBrownBuf=()=>{
  const sr=actx.sampleRate, len=sr*6;
  const buf=actx.createBuffer(2,len,sr);
  for(let c=0;c<2;c++){
    const d=buf.getChannelData(c);
    let b=0, peak=0;
    for(let i=0;i<len;i++){b=b*0.997+(Math.random()*2-1)*0.003; d[i]=b; peak=Math.max(peak,Math.abs(b));}
    if(peak>0){const sc=0.88/peak; for(let i=0;i<len;i++)d[i]*=sc;} // normalise to 0.88 peak
  }
  return buf;
};

const startWater=()=>{
  if(!actx||wNoise)return;
  const buf=makeBrownBuf();
  wNoise=actx.createBufferSource();
  wNoise.buffer=buf; wNoise.loop=true;
  const lp=actx.createBiquadFilter(); lp.type='lowpass';  lp.frequency.value=600;
  const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=40;
  const wg=actx.createGain(); wg.gain.value=0.042;
  wNoise.connect(lp); lp.connect(hp); hp.connect(wg); wg.connect(_mComp||actx.destination);
  wNoise.start();
};
const stopWater=()=>{if(wNoise){try{wNoise.stop()}catch(e){}wNoise=null}};

// playA: isochronic tone system
// 1. Brown noise carrier, amplitude-modulated at ISO_HZ[idx] (brainwave entrainment)
//    — hard on/off gating at the isochronic rate creates the distinct "pulse" character
// 2. Solfeggio fundamental (fr Hz) as a soft sine underneath
// 3. Octave sub (fr/2) at very low volume for body resonance
const playA=(fr,idx)=>{
  if(!actx||!sndOn)return;
  stopA();
  const t=actx.currentTime;
  const isoHz=ISO_HZ[idx]||8;

  // ── Brown noise isochronic carrier ────────────────────────────────────────
  // New short brown noise buffer looped, gated by a ScriptProcessor-free
  // approach: use an OscillatorNode as the AM modulator.
  // Isochronic = noise burst on, silence off, at isoHz rate.
  // We use gain node modulated by a rectified oscillator.
  const noiseBuf=makeBrownBuf();
  const nSrc=actx.createBufferSource();
  nSrc.buffer=noiseBuf; nSrc.loop=true;

  // LP + HP shape the noise spectrum
  const nlp=actx.createBiquadFilter(); nlp.type='lowpass';  nlp.frequency.value=700;
  const nhp=actx.createBiquadFilter(); nhp.type='highpass'; nhp.frequency.value=60;

  // Master noise gain, fades in
  const noiseGain=actx.createGain();
  noiseGain.gain.setValueAtTime(0,t);
  noiseGain.gain.linearRampToValueAtTime(0.055,t+2.5);

  // Route: nSrc → nlp → nhp → noiseGain → destination
  nSrc.connect(nlp); nlp.connect(nhp); nhp.connect(noiseGain);
  noiseGain.connect(_mComp||actx.destination);

  // AM gate: triangle osc → WaveShaper (abs-rect) → noiseGain.gain
  // abs(sin) shape on triangle gives clean isochronic pulse without DC accumulation
  const amOsc=actx.createOscillator();
  amOsc.frequency.value=isoHz;
  amOsc.type='triangle';
  const wsData=new Float32Array(256);
  for(let i=0;i<256;i++){const x=i/255*2-1; wsData[i]=Math.abs(x);}
  const ws=actx.createWaveShaper(); ws.curve=wsData;
  amOsc.connect(ws); ws.connect(noiseGain.gain);
  amOsc.start();

  // ── Solfeggio sine fundamental ────────────────────────────────────────────
  const sol=actx.createOscillator(); sol.type='sine'; sol.frequency.value=fr;
  const solG=actx.createGain();
  solG.gain.setValueAtTime(0,t);
  solG.gain.linearRampToValueAtTime(0.038,t+3.0);
  sol.connect(solG); solG.connect(_mComp||actx.destination); sol.start();

  // ── Sub octave ────────────────────────────────────────────────────────────
  const sub=actx.createOscillator(); sub.type='sine'; sub.frequency.value=fr*.5;
  const subG=actx.createGain();
  subG.gain.setValueAtTime(0,t);
  subG.gain.linearRampToValueAtTime(0.018,t+3.5);
  sub.connect(subG); subG.connect(_mComp||actx.destination); sub.start();

  aN.push({o:sol,g:solG},{o:sub,g:subG},{sp:nSrc,o:amOsc,g:noiseGain});
};

// ═══════════════════════════════════════════════════════════════════════════════
// GPU WATER PHYSICS — Navier-Stokes on render textures (ping-pong)
//
// Layout per pixel of each RT:
//   simRT  .r = H (water depth)   .g = h_ripple_cur   .b = h_ripple_prev   .a = terrain
//   velRT  .r = velocity_x        .g = velocity_z      .b = divergence       .a = pressure
//
// Equations implemented:
//   [1] H_new = H - dt * div(H*u)              (shallow water continuity)
//   [2] u_new = u - g*dt*grad(H+b) - k*dt*u   (momentum + gravity + friction)
//   [3] div(u) → p via Jacobi                  (pressure Poisson)
//   [4] u -= dt/rho * grad(p)                   (pressure projection)
//   [5] h_rip_new = 2h - h_old + c²dt²∇²h - λ*(h-h_old)  (ripple wave eq)
// ═══════════════════════════════════════════════════════════════════════════════

const SIM_RES = 256; // sim grid resolution — power of 2, GPU-friendly
const SIM_DT  = 0.016;
const SIM_G   = 9.2;   // gravity
const SIM_K   = 0.018; // friction/damping
const SIM_C   = 3.8;   // ripple wave speed
const SIM_LAM = 0.012; // ripple damping
const SIM_RHO = 1.0;   // density (water ~1)
const SIM_H   = 1.0/SIM_RES; // cell size in UV space

// ── Render targets ────────────────────────────────────────────────────────────
const rtOpts={minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter,
  type:THREE.HalfFloatType,depthBuffer:false};
let simRT_A=new THREE.WebGLRenderTarget(SIM_RES,SIM_RES,rtOpts);
let simRT_B=new THREE.WebGLRenderTarget(SIM_RES,SIM_RES,rtOpts);
let velRT_A=new THREE.WebGLRenderTarget(SIM_RES,SIM_RES,rtOpts);
let velRT_B=new THREE.WebGLRenderTarget(SIM_RES,SIM_RES,rtOpts);
let presRT_A=new THREE.WebGLRenderTarget(SIM_RES,SIM_RES,rtOpts);
let presRT_B=new THREE.WebGLRenderTarget(SIM_RES,SIM_RES,rtOpts);

// ── Offscreen fullscreen quad rig ─────────────────────────────────────────────
const simCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const simScene=new THREE.Scene();
const simQuad=new THREE.Mesh(new THREE.PlaneGeometry(2,2));
simScene.add(simQuad);

// ── GLSL shared snippets ──────────────────────────────────────────────────────
const GLSL_SAMPLE=`
  vec4 sS(sampler2D tx,vec2 uv){return texture2D(tx,fract(uv));}
  vec4 sC(sampler2D tx,vec2 uv){return texture2D(tx,clamp(uv,vec2(0.001),vec2(0.999)));}
`;

const GLSL_PERLIN=`
  vec3 _pp(vec3 p){p=fract(p*vec3(.1031,.103,.0973));p+=dot(p,p.yxz+19.19);return fract((p.xxy+p.yxx)*p.zyx);}
  float _pn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
    float a=dot(_pp(vec3(i,0.)).xy,f),b=dot(_pp(vec3(i+vec2(1,0),0.)).xy,f-vec2(1,0)),
          c=dot(_pp(vec3(i+vec2(0,1),0.)).xy,f-vec2(0,1)),d=dot(_pp(vec3(i+vec2(1,1),0.)).xy,f-vec2(1,1));
    return mix(mix(a,b,u.x),mix(c,d,u.x),u.y)*.5+.5;}
  float pfbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*_pn(p);p*=2.1;p+=vec2(3.1,7.3);a*=.5;}return v;}

  vertexShader:GLSL_VERT,

    uniform sampler2D uSim,uVel;
    uniform float uDt,uG,uK,uH,uTime;

    void main(){

      float hC =sC(uSim,uv).r;
      float hR =sC(uSim,uv+vec2(uH,0.)).r;
      float hL =sC(uSim,uv-vec2(uH,0.)).r;
      float hU =sC(uSim,uv+vec2(0.,uH)).r;
      float hD =sC(uSim,uv-vec2(0.,uH)).r;

// ── Pass 2: Pressure Jacobi (run N times, ping-pong presRT) ──────────────────

  uniforms:{
    uVel:{value:velRT_B.texture},

    uH:{value:SIM_H}, uDt:{value:SIM_DT}, uRho:{value:SIM_RHO},

      float pL=sC(uPres,vUV-vec2(uH,0.)).r;

      float pD=sC(uPres,vUV-vec2(0.,uH)).r;

// ── Pass 3: Pressure projection (subtract grad(p) from velocity) ──────────────

  uniforms:{
    uVel:{value:velRT_B.texture},
    uPres:{value:presRT_A.texture},
    uH:{value:SIM_H}, uDt:{value:SIM_DT}, uRho:{value:SIM_RHO},
  },
  vertexShader:GLSL_VERT,
  fragmentShader:`
    uniform sampler2D uVel,uPres;
    uniform float uH,uDt,uRho;
    varying vec2 vUV;
    ${GLSL_SAMPLE}
    void main(){

      vec4 v=sC(uVel,vUV);

      float pL=sC(uPres,vUV-vec2(uH,0.)).r;
      float pU=sC(uPres,vUV+vec2(0.,uH)).r;
      float pD=sC(uPres,vUV-vec2(0.,uH)).r;
      float gpx=(pR-pL)/(2.*uH);
      float gpz=(pU-pD)/(2.*uH);

// ── Pass 4: Advect H + ripple wave equation ───────────────────────────────────

  uniforms:{
    uSim:{value:simRT_A.texture},
    uVel:{value:velRT_B.texture},

window._waterSim={
  velMat, presMat, projMat, simMat,
  simRT_A, simRT_B, velRT_A, velRT_B, presRT_A, presRT_B,
  simScene, simCam, simQuad,
  JACOBI_ITERS: 24,
  step(t){
    const ws=window._waterSim;
    const r=renderer;

    // Pass 1: velocity advect + gravity (reads simRT_A, velRT_A → velRT_B)
    ws.velMat.uniforms.uSim.value=ws.simRT_A.texture;
    ws.velMat.uniforms.uVel.value=ws.velRT_A.texture;
    ws.velMat.uniforms.uTime.value=t;
    ws.simQuad.material=ws.velMat;
    r.setRenderTarget(ws.velRT_B); r.render(ws.simScene,ws.simCam);

    // Pass 2+3: Jacobi pressure solve (ping-pong presRT)
    ws.presMat.uniforms.uVel.value=ws.velRT_B.texture;
    for(let j=0;j<ws.JACOBI_ITERS;j++){
      ws.presMat.uniforms.uPres.value=(j%2===0)?ws.presRT_A.texture:ws.presRT_B.texture;
      ws.simQuad.material=ws.presMat;
      const tgt=(j%2===0)?ws.presRT_B:ws.presRT_A;
      r.setRenderTarget(tgt); r.render(ws.simScene,ws.simCam);
    }
    const finalPres=(ws.JACOBI_ITERS%2===0)?ws.presRT_A:ws.presRT_B;

    // Pass 3: project velocity (reads velRT_B, finalPres → velRT_A)
    ws.projMat.uniforms.uVel.value=ws.velRT_B.texture;
    ws.projMat.uniforms.uPres.value=finalPres.texture;
    ws.simQuad.material=ws.projMat;
    r.setRenderTarget(ws.velRT_A); r.render(ws.simScene,ws.simCam);

    // Pass 4: advect H + ripple (reads simRT_A, velRT_A → simRT_B)
    ws.simMat.uniforms.uSim.value=ws.simRT_A.texture;
    ws.simMat.uniforms.uVel.value=ws.velRT_A.texture;
    ws.simMat.uniforms.uTime.value=t;
    ws.simQuad.material=ws.simMat;
    r.setRenderTarget(ws.simRT_B); r.render(ws.simScene,ws.simCam);

    // Ping-pong swap
    let tmp=ws.simRT_A; ws.simRT_A=ws.simRT_B; ws.simRT_B=tmp;
    r.setRenderTarget(null);

    // Feed result into surface material
    wU.uSimTex&&(wU.uSimTex.value=ws.simRT_A.texture);
  }
};

// ═══════════════════════════════════════════════════════════════════════════════
// PERLIN NOISE (JS) — for cave voxel density field
// ═══════════════════════════════════════════════════════════════════════════════
const _perm=(()=>{const p=new Uint8Array(512);for(let i=0;i<256;i++)p[i]=i;
  for(let i=255;i>0;i--){const j=Math.random()*(i+1)|0;[p[i],p[j]]=[p[j],p[i]];}
  for(let i=0;i<256;i++)p[256+i]=p[i];return p;})();
function _fade(t){return t*t*t*(t*(t*6-15)+10);}
function _lerp(a,b,t){return a+t*(b-a);}
function _grad(h,x,y,z){h&=15;const u=h<8?x:y,v=h<4?y:h===12||h===14?x:z;return((h&1)?-u:u)+((h&2)?-v:v);}
function perlin3(x,y,z){
  const X=Math.floor(x)&255,Y=Math.floor(y)&255,Z=Math.floor(z)&255;
  x-=Math.floor(x);y-=Math.floor(y);z-=Math.floor(z);
  const u=_fade(x),v=_fade(y),w=_fade(z);
  const A=_perm[X]+Y,AA=_perm[A]+Z,AB=_perm[A+1]+Z,B=_perm[X+1]+Y,BA=_perm[B]+Z,BB=_perm[B+1]+Z;
  return _lerp(_lerp(_lerp(_grad(_perm[AA],x,y,z),_grad(_perm[BA],x-1,y,z),u),
    _lerp(_grad(_perm[AB],x,y-1,z),_grad(_perm[BB],x-1,y-1,z),u),v),
    _lerp(_lerp(_grad(_perm[AA+1],x,y,z-1),_grad(_perm[BA+1],x-1,y,z-1),u),
    _lerp(_grad(_perm[AB+1],x,y-1,z-1),_grad(_perm[BB+1],x-1,y-1,z-1),u),v),w);}
function fbmJS(x,y,z,oct=5){let v=0,a=.5,freq=1;
  for(let i=0;i<oct;i++){v+=a*perlin3(x*freq,y*freq,z*freq);a*=.5;freq*=2.1;}return v;}

// ═══════════════════════════════════════════════════════════════════════════════
// VOXEL CAVE — Geology + Fault + Walker + Chamber + Collapse pipeline (doc §1–§19)
// Implements: strata hardness · fault weakness planes · biased erosion walkers ·
// chamber expansion at fault intersections · ceiling collapse pass.
// Core equation: cavity_prob = fracture × water_flow × solubility × time / hardness
// ═══════════════════════════════════════════════════════════════════════════════
(()=>{
  const STEP=3.2, X0=-48,X1=48,Y0=-10,Y1=20,Z0=-48,Z1=48;
  const THRESH=0.12;
  const verts=[], norms=[], cols=[];

  // ── Helpers ─────────────────────────────────────────────────────────────────
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const lerp=(a,b,t)=>a+(b-a)*t;

  // ── §③ Geology pass ─ strata + solubility + base hardness ──────────────────
  // strata: horizontal sine layers biased toward horizontal cave growth
  const strata=(x,y,z)=>{
    const warp=fbmJS(x*.03,0,z*.03,3)*4;
    return Math.sin(y*0.38+warp)*0.5+0.5; // 0..1, peaks at strata boundaries
  };
  // hardness: granite-ish base, limestone pockets, sandstone bands
  const hardness=(x,y,z)=>{
    const s=strata(x,y,z);
    const base=0.55;
    const limestone=clamp(fbmJS(x*.05+11,y*.04,z*.05+7,4)*1.2,0,1); // high solubility
    return base + s*0.25 - limestone*0.18; // 0.12..0.80
  };
  // solubility: limestone zones dissolve fastest
  const solubility=(x,y,z)=>clamp(fbmJS(x*.06+3,y*.05+9,z*.06+1,3)*1.4,0.05,1.0);

  // ── §④ Fault planes ─ 6 faults, each weakens rock nearby ──────────────────
  const FAULTS=[
    {o:[0,4,0],    n:[0.71,0.1,0.71]},   // diagonal NE
    {o:[8,-2,8],   n:[-0.71,0.05,0.71]}, // diagonal NW
    {o:[-12,2,5],  n:[0.5,0.2,-0.84]},   // oblique
    {o:[5,6,-10],  n:[0.87,0.0,0.5]},    // near-vertical
    {o:[0,0,0],    n:[0.0,0.15,1.0]},    // horizontal slab
    {o:[-6,8,6],   n:[1.0,0.1,0.0]},     // axial
  ];
  const faultStrength=(x,y,z)=>{
    let f=0;
    for(const {o,n} of FAULTS){
      const d=Math.abs((x-o[0])*n[0]+(y-o[1])*n[1]+(z-o[2])*n[2]);
      f+=Math.exp(-d*d/36); // fault_width²=36
    }
    return clamp(f,0,1);
  };

  // ── §⑤+⑥ Biased erosion walkers ────────────────────────────────────────────
  // Pre-compute erosion field: each walker carves a Gaussian corridor
  // Walker flow: score = 0.45*prev_dir + 0.25*downhill + 0.20*fault_grad + 0.10*noise
  const EROSION=new Float32Array(30*10*30); // 30×10×30 coarse grid
  const EGX=30, EGY=10, EGZ=30;
  const toIdx=(ix,iy,iz)=>clamp(iy,0,EGY-1)*EGX*EGZ+clamp(iz,0,EGZ-1)*EGX+clamp(ix,0,EGX-1);
  const worldToGrid=(wx,wy,wz)=>[
    Math.round((wx-X0)/(X1-X0)*(EGX-1)),
    Math.round((wy-Y0)/(Y1-Y0)*(EGY-1)),
    Math.round((wz-Z0)/(Z1-Z0)*(EGZ-1))
  ];
  const gridToWorld=(ix,iy,iz)=>[
    X0+ix/(EGX-1)*(X1-X0),
    Y0+iy/(EGY-1)*(Y1-Y0),
    Z0+iz/(EGZ-1)*(Z1-Z0)
  ];
  // 12 walkers, each starting near the shell r=30..38
  for(let w=0;w<12;w++){
    const ang=w/12*Math.PI*2+fbmJS(w,0,0,1)*0.4;
    const startR=30+fbmJS(w*3,1,0,2)*8;
    let px=Math.cos(ang)*startR, py=6+fbmJS(w,5,0,2)*6, pz=Math.sin(ang)*startR;
    let dx=0,dy=-0.3,dz=0; // initial: mostly downward
    const sol=solubility(px,py,pz);
    const maxSteps=55+Math.floor(fbmJS(w,2,w,1)*30);
    for(let s=0;s<maxSteps;s++){
      // Write erosion at this position
      const [ix,iy,iz]=worldToGrid(px,py,pz);
      const radius=2+fbmJS(px*.08,py*.1,pz*.08,2)*2.5;
      for(let di=-2;di<=2;di++) for(let dj=-2;dj<=2;dj++) for(let dk=-2;dk<=2;dk++){
        const ii=ix+di, ij=iy+dj, ik=iz+dk;
        if(ii<0||ii>=EGX||ij<0||ij>=EGY||ik<0||ik>=EGZ) continue;
        const [wx,wy,wz]=gridToWorld(ii,ij,ik);
        const dist=Math.sqrt((wx-px)**2+(wy-py)**2+(wz-pz)**2);
        const carve=Math.exp(-dist*dist/(radius*radius*2))*sol*0.85;
        EROSION[toIdx(ii,ij,ik)]+=carve;
      }
      // Biased direction update (§⑭)
      const fx=faultStrength(px+0.5,py,pz)-faultStrength(px-0.5,py,pz);
      const fz=faultStrength(px,py,pz+0.5)-faultStrength(px,py,pz-0.5);
      const nx2=dx*.45+0*.25+fx*.20+(fbmJS(px*.1,py*.1,pz*.1,1)-.5)*.20;
      const ny2=dy*.45-0.25*.25+0*.20+(fbmJS(px*.1+9,py*.1,pz*.1,1)-.5)*.10;
      const nz2=dz*.45+0*.25+fz*.20+(fbmJS(px*.1,py*.1,pz*.1+7,1)-.5)*.20;
      const len=Math.sqrt(nx2*nx2+ny2*ny2+nz2*nz2)||1;
      dx=nx2/len; dy=ny2/len; dz=nz2/len;
      px+=dx*STEP; py+=dy*STEP; pz+=dz*STEP;
      // Branch (§⑭ branch_chance≈0.03)
      if(Math.random()<0.03 && s<maxSteps-8){
        const ba=Math.random()*Math.PI*2;
        const bpx=px+Math.cos(ba)*STEP*2, bpz=pz+Math.sin(ba)*STEP*2;
        const [bix,biy,biz]=worldToGrid(bpx,py,bpz);
        const br=2+Math.random()*2;
        for(let di=-1;di<=1;di++) for(let dj=-1;dj<=1;dj++) for(let dk=-1;dk<=1;dk++){
          const ii=bix+di,ij=biy+dj,ik=biz+dk;
          if(ii>=0&&ii<EGX&&ij>=0&&ij<EGY&&ik>=0&&ik<EGZ)
            EROSION[toIdx(ii,ij,ik)]+=0.4*sol;
        }
      }
    }
  }
  // Normalise erosion field 0..1
  let eMax=0; for(let i=0;i<EROSION.length;i++) if(EROSION[i]>eMax) eMax=EROSION[i];
  if(eMax>0) for(let i=0;i<EROSION.length;i++) EROSION[i]/=eMax;

  // ── §⑧ Chamber expansion ─ at fault intersections ──────────────────────────
  const CHAMBERS=[]; // {x,y,z,r}
  for(const f1 of FAULTS) for(const f2 of FAULTS){
    if(f1===f2) continue;
    // Approximate intersection: midpoint biased toward shell
    const ang=Math.atan2(f1.o[2]-f2.o[2],f1.o[0]-f2.o[0]);
    const r=28+Math.random()*8;
    CHAMBERS.push({x:Math.cos(ang)*r,y:f1.o[1]*0.5+f2.o[1]*0.5,z:Math.sin(ang)*r,
                   rad:5+Math.random()*7});
  }
  const chamberBoost=(x,y,z)=>{
    let b=0;
    for(const c of CHAMBERS){
      const d2=(x-c.x)**2+(y-c.y)**2+(z-c.z)**2;
      b+=Math.exp(-d2/(c.rad*c.rad*2))*0.7;
    }
    return clamp(b,0,0.8);
  };

  // ── §② Unified density field ────────────────────────────────────────────────
  // D = R(x,y,z) − E(x,y,z)   (doc §②)
  // cavity when D < THRESH → solid when D ≥ THRESH
  const getErosion=(x,y,z)=>{
    const [ix,iy,iz]=worldToGrid(x,y,z);
    return EROSION[toIdx(ix,iy,iz)];
  };
  const density=(x,y,z)=>{
    const r=Math.sqrt(x*x+z*z);
    // Shell: cave exists between r=20..46
    const shellMask=Math.max(0,1-Math.abs(r-33)/13);
    const yMask=Math.max(0,1-Math.abs(y-4)/15);
    if(shellMask<0.01||yMask<0.01) return 0; // outside world → air (not cave)

    // Rock hardness (geology) minus erosion and chamber expansion
    const H=hardness(x,y,z);
    const F=faultStrength(x,y,z)*0.35;   // faults weaken rock
    const E=getErosion(x,y,z)*0.60;       // walker erosion
    const Ch=chamberBoost(x,y,z);         // chamber expansion
    const noise_detail=fbmJS(x*.09+7,y*.07+3,z*.09+2,3)*0.12; // fine texture

    const D=(H - F - E - Ch)*shellMask*yMask + noise_detail;
    return D; // solid when > THRESH
  };

  // ── §⑨ Collapse pass ─ 1 iteration of ceiling instability ──────────────────
  // Sample density above each voxel; if support low → air out the ceiling
  // Implemented by subtracting from density when surrounded by air above
  const densityWithCollapse=(x,y,z)=>{
    const d=density(x,y,z);
    if(d<THRESH) return d; // already air
    // Count solid neighbors above and to sides
    const s=STEP;
    let support=0;
    if(density(x,y+s,z)>THRESH) support++;
    if(density(x+s,y,z)>THRESH) support++;
    if(density(x-s,y,z)>THRESH) support++;
    if(density(x,y,z+s)>THRESH) support++;
    if(density(x,y,z-s)>THRESH) support++;
    // If only 0-1 solid neighbors → collapse (subtract density)
    if(support<2 && density(x,y-s,z)<THRESH){
      return d - 0.10; // tip it toward air
    }
    return d;
  };

  // ── Face emitter (unchanged architecture) ───────────────────────────────────
  const D2=(x,y,z)=>densityWithCollapse(x,y,z)>THRESH;
  const pushFace=(ax,ay,az, bx,by,bz, cx,cy,cz, dx,dy,dz, nx,ny,nz)=>{
    // Colour varies: geology strata tint + fault zone slightly warmer
    const strataV=strata(ax,ay,az);
    const faultV=faultStrength(ax,ay,az);
    const h=0.57+strataV*.06+faultV*.04; // blue-grey to teal-grey
    const s2=0.30+faultV*.15;
    const l=0.08+strataV*.08+fbmJS(ax*.05,ay*.05,az*.05,2)*.06;
    const c=new THREE.Color().setHSL(h,s2,l);
    for(const [px,py,pz] of [[ax,ay,az],[bx,by,bz],[cx,cy,cz],[ax,ay,az],[cx,cy,cz],[dx,dy,dz]]){
      verts.push(px,py,pz); norms.push(nx,ny,nz); cols.push(c.r,c.g,c.b);
    }
  };

  for(let x=X0;x<X1;x+=STEP){
    for(let y=Y0;y<Y1;y+=STEP){
      for(let z=Z0;z<Z1;z+=STEP){
        const s=STEP;
        const c=D2(x,y,z);
        if(!c&&D2(x+s,y,z)){pushFace(x+s,y,z,x+s,y+s,z,x+s,y+s,z+s,x+s,y,z+s,1,0,0);}
        if(c&&!D2(x+s,y,z)){pushFace(x+s,y,z,x+s,y,z+s,x+s,y+s,z+s,x+s,y+s,z,-1,0,0);}
        if(!c&&D2(x,y+s,z)){pushFace(x,y+s,z,x+s,y+s,z,x+s,y+s,z+s,x,y+s,z+s,0,1,0);}
        if(c&&!D2(x,y+s,z)){pushFace(x,y+s,z,x,y+s,z+s,x+s,y+s,z+s,x+s,y+s,z,0,-1,0);}
        if(!c&&D2(x,y,z+s)){pushFace(x,y,z+s,x,y+s,z+s,x+s,y+s,z+s,x+s,y,z+s,0,0,1);}
        if(c&&!D2(x,y,z+s)){pushFace(x,y,z+s,x+s,y,z+s,x+s,y+s,z+s,x,y+s,z+s,0,0,-1);}
      }
    }
  }

  if(verts.length>0){
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(verts),3));
    geo.setAttribute('normal',new THREE.BufferAttribute(new Float32Array(norms),3));
    geo.setAttribute('color',new THREE.BufferAttribute(new Float32Array(cols),3));
    const mat=new THREE.MeshStandardMaterial({
      vertexColors:true, roughness:.96, metalness:.04,
      emissive:new THREE.Color(0x010a18), emissiveIntensity:.35,
      side:THREE.BackSide
    });
    scene.add(new THREE.Mesh(geo,mat));
  }
})();

// ═══════════════════════════════════════════════════════════════════════════════
// GAUSSIAN SPLAT BIOLUMINESCENCE — oriented billboard quads with gaussian
// opacity falloff. Simulates soft glowing bio-organisms on cave walls/ceiling.
// ═══════════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════════
// CAVE-LUX — Bioluminescent agent communication system (doc §1–§15)
//
// Each agent: {pos, facing, phase, flashRate, energy, state, backoff,
//              intensity, hue, queue, seenMsgs, id}
//
// Light propagation: Ir = Ie * cos(θe)^p * cos(θr)^q / (d²+ε) * e^(-κd) * (1+ρB)
// Pulse encoding: timing-based (short gap=0, long gap=1), SYNC+END markers
// Synchronization: phase += couplingStrength*(1-phase) + jitter  (firefly-like)
// Routing: glow-gossip — re-relay if TTL>0 and not seen before
// Collision avoidance: listen-before-flash, exponential backoff window
// ═══════════════════════════════════════════════════════════════════════════════

const CAVELUX_N = 48;          // agent count (perf budget)
const CL_KAPPA  = 0.022;       // humidity absorption κ
const CL_RHO    = 0.28;        // wall reflectance ρ
const CL_P      = 2.0;         // emitter beam sharpness
const CL_Q      = 1.5;         // receiver gain sharpness
const CL_COUPLE = 0.04;        // firefly coupling strength
const CL_SLOT   = 0.18;        // CSMA slot time (s)

// BIOCOLS: [hue, saturation label] pairs — blue-green spectrum per §15
const BIOCOLS_HSL=[
  [0.48,0.9,0.55],[0.52,1.0,0.50],[0.42,0.85,0.58],
  [0.62,0.8,0.52],[0.38,0.9,0.60],[0.56,0.95,0.48]
];

// Message type encoding per §3
const CL_TYPE={BEACON:0,WARNING:1,ROUTE:2,SOCIAL:3};

// ── Agent factory ────────────────────────────────────────────────────────────
const clAgents=[];
for(let i=0;i<CAVELUX_N;i++){
  const ang=Math.random()*Math.PI*2;
  const r=20+Math.random()*24;
  const y=-4+Math.random()*22;
  const hsl=BIOCOLS_HSL[i%BIOCOLS_HSL.length];
  const col=new THREE.Color().setHSL(hsl[0],hsl[1],hsl[2]);
  clAgents.push({
    id:i,
    pos:new THREE.Vector3(Math.sin(ang)*r,y,Math.cos(ang)*r),
    facing:new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize(),
    phase:Math.random(),
    flashRate:0.15+Math.random()*0.18,  // §6: each agent has own rate
    energy:100,
    intensity:0,          // current visible intensity (for GPU splat)
    col,                  // THREE.Color
    hue:hsl[0],
    state:'idle',         // idle | transmitting | backoff
    backoff:0,
    backoffWindow:4,      // CSMA window W, doubles on collision
    queue:[],             // outgoing message queue
    seenMsgs:new Set(),   // gossip dedup
    ttl:0,                // flash display timer
  });
}

// ── Optical signal model §2 ──────────────────────────────────────────────────
// Ir = Ie * cos(θe)^p * cos(θr)^q / (d²+ε) * e^(-κd) * (1+ρB)
function clSignal(Ie, d, cosE, cosR, bounce=0.4){
  const directional = Math.pow(Math.max(0,cosE), CL_P);
  const gain        = Math.pow(Math.max(0,cosR), CL_Q);
  const distLoss    = 1/(d*d + 0.001);
  const absorb      = Math.exp(-CL_KAPPA*d);
  const reflect     = 1 + CL_RHO*bounce;
  return Ie * directional * gain * distLoss * absorb * reflect;
}

// ── Sense visible light for one agent §8 ────────────────────────────────────
function clSense(rcv){
  let total=0;
  for(const em of clAgents){
    if(em.id===rcv.id || em.intensity<0.001) continue;
    const d=rcv.pos.distanceTo(em.pos);
    if(d>38) continue;  // beyond cave range
    const toRcv=new THREE.Vector3().subVectors(rcv.pos,em.pos).normalize();
    const toEm =new THREE.Vector3().subVectors(em.pos,rcv.pos).normalize();
    const cosE=em.facing.dot(toRcv);
    const cosR=rcv.facing.dot(toEm);
    const Ir=clSignal(em.intensity, d, cosE, cosR);
    total+=Ir + (Math.random()-0.5)*0.002; // §8: noisy_intensity
  }
  return total;
}

// ── Encode bits to pulse pattern §4 ─────────────────────────────────────────
function clEncode(bits){ return ['SYNC',...bits.map(b=>b?'L':'S'),'END']; }

// ── CRC: simple XOR of bit array §3 ─────────────────────────────────────────
function clCRC(bits){ return bits.reduce((a,b)=>a^b,0); }

// ── Gossip relay §10 ─────────────────────────────────────────────────────────
function clRelay(agent, msg){
  if(agent.seenMsgs.has(msg.id)) return;
  agent.seenMsgs.add(msg.id);
  if(msg.ttl<=0) return;
  const relayMsg={...msg, ttl:msg.ttl-1,
    delay:0.12+Math.random()*0.18+msg.hop*0.04,  // §10 relay delay
    hop:(msg.hop||0)+1};
  agent.queue.push(relayMsg);
}

// ── Agent update §7 ──────────────────────────────────────────────────────────
const CL_DT=1/60;
function clUpdate(t){
  for(const ag of clAgents){

    // Phase tick §6
    ag.phase += CL_DT * ag.flashRate;

    // Sense environment §8
    const visLight=clSense(ag);

    // Firefly sync §6: phase += coupling*(1-phase) + jitter
    if(visLight>0.008){
      ag.phase += CL_COUPLE*(1-ag.phase);
      ag.phase += (Math.random()-0.5)*0.018; // jitter prevents lockstep
    }

    // Decay intensity (visual TTL)
    ag.intensity *= 0.88;

    // Backoff countdown §5
    if(ag.state==='backoff'){
      ag.backoff-=CL_DT;
      if(ag.backoff<=0) ag.state='idle';
    }

    // Transmit or beacon §7
    if(ag.state==='idle'){
      if(ag.queue.length>0){
        const msg=ag.queue[0];
        if(msg.delay&&msg.delay>0){ msg.delay-=CL_DT; }
        else{
          // Listen-before-flash §5
          if(visLight>0.012){
            // Channel busy — backoff
            ag.backoff=Math.ceil(1+Math.random()*ag.backoffWindow)*CL_SLOT;
            ag.backoffWindow=Math.min(ag.backoffWindow*2,64);
            ag.state='backoff';
          } else {
            // Transmit
            ag.queue.shift();
            const Ie=msg.type===CL_TYPE.WARNING?1.0:
                      msg.type===CL_TYPE.ROUTE?0.6:0.3; // §11 energy budget
            ag.intensity=Ie*(0.9+Math.random()*0.1);
            ag.energy-=Ie*0.8;
            ag.backoffWindow=Math.max(4,ag.backoffWindow*0.5); // reset on success §5
            ag.ttl=8;
          }
        }
      } else if(ag.phase>=1.0){
        // Beacon flash §6
        ag.phase=Math.random()*0.08; // reset + jitter
        ag.intensity=0.28+Math.random()*0.18;
        ag.energy-=0.08;
        ag.ttl=5;
        // 12% chance of spawning a gossip route signal §10
        if(Math.random()<0.12){
          const msgId=ag.id*10000+Math.floor(t*100);
          if(!ag.seenMsgs.has(msgId)){
            ag.seenMsgs.add(msgId);
            const bits=[1,0,1,1,0];
            const payload=clEncode(bits);
            const msg={id:msgId,type:CL_TYPE.ROUTE,sender:ag.id,
              hop:0,ttl:3,payload,delay:0};
            // Relay to nearby agents
            for(const nb of clAgents){
              if(nb.id!==ag.id && ag.pos.distanceTo(nb.pos)<18)
                clRelay(nb,msg);
            }
          }
        }
      }
    }

    // Chakra activation: agents near active pillar emit WARNING bursts
    if(window._clChakraPos){
      const dist=ag.pos.distanceTo(window._clChakraPos);
      if(dist<12 && Math.random()<0.08){
        const warnId=ag.id*99999+Math.floor(t*50);
        if(!ag.seenMsgs.has(warnId)){
          ag.seenMsgs.add(warnId);
          ag.queue.unshift({id:warnId,type:CL_TYPE.WARNING,
            sender:ag.id,hop:0,ttl:4,
            payload:clEncode([1,1,0,1]),delay:0});
        }
      }
    }

    // Clamp energy
    ag.energy=Math.max(10,Math.min(100,ag.energy+CL_DT*0.5));
  }
}

// MERKABA — raymarched SDF billboard sprites
//
// Each merkaba = one PlaneGeometry billboard quad.
// Fragment shader raymarches the star-tetrahedron SDF:
//   sdMerkaba(p,rot) = min(sdTetra(p,r), sdTetra(Ry(π)*p, r))
// with counter-rotating tetrahedra, edge glow, interior chroma, Fresnel rim.
// No mesh geometry = no vertex count, no normal/wireframe artifacts.
// ═══════════════════════════════════════════════════════════════════════════════

const MERKABA_DEFS=[
  {hue:0.00,r:1.0},{hue:0.33,r:1.2},{hue:0.55,r:1.1},
  {hue:0.66,r:0.95},{hue:0.82,r:1.15}
];

// Merkaba raymarching shader — self-contained, no shared state
const MERKABA_VERT=`
  varying vec3 vWorldPos;
  varying vec2 vUV;
  void main(){
    vUV=uv;
    vec4 wp=modelMatrix*vec4(position,1.);
    vWorldPos=wp.xyz;
    gl_Position=projectionMatrix*viewMatrix*wp;
  }`;

const MERKABA_FRAG=`
  uniform vec3  uCamPos;
  uniform vec3  uCol;
  uniform float uTime;
  uniform float uGlow;
  uniform float uSize;
  varying vec3  vWorldPos;
  varying vec2  vUV;

  // ── SDF helpers ────────────────────────────────────────────────────────────
  // Rotation matrix around Y axis
  mat3 rotY(float a){float c=cos(a),s=sin(a);return mat3(c,0,s,0,1,0,-s,0,c);}
  mat3 rotX(float a){float c=cos(a),s=sin(a);return mat3(1,0,0,0,c,-s,0,s,c);}

  // SDF of a regular tetrahedron centred at origin, circumradius r
  // Analytically: fold space using symmetry planes
  float sdTetra(vec3 p, float r){
    // Four symmetry planes of a tetrahedron
    float md=max(max(-p.x-p.y-p.z,-p.x+p.y+p.z),max(p.x-p.y+p.z,p.x+p.y-p.z));
    return (md-r)*0.57735; // 1/sqrt(3) normalisation
  }

  // Star-tetrahedron (merkaba) = union of tetrahedron + inverse tetrahedron
  float sdMerkaba(vec3 p, float r, float rot){
    vec3 pa=rotY(rot)*p;
    vec3 pb=rotY(-rot)*rotX(3.14159)*p; // counter-rotate + flip
    return min(sdTetra(pa,r), sdTetra(pb,r));
  }

  // ── Raymarcher ─────────────────────────────────────────────────────────────
  void main(){
    vec2 uv=vUV*2.-1.;
    // Ray from camera through this billboard pixel
    vec3 ro=uCamPos;
    vec3 rd=normalize(vWorldPos-uCamPos);

    float rot=uTime*.22;                // tetra counter-rotation speed
    float r=uSize*.72;                  // SDF radius

    // March along ray
    float t=0., minD=1e9;
    int steps=0;
    for(int i=0;i<56;i++){
      vec3 p=ro+rd*t;
      // Local space: translate to billboard centre
      p-=vWorldPos;
      float d=sdMerkaba(p,r,rot);
      minD=min(minD,abs(d));
      if(d<0.008) break;
      t+=max(d*.6,.005);
      if(t>uSize*3.) break;
      steps=i;
    }

    // Hit test
    bool hit=(minD<0.018);

    // Edge glow — strong near surface
    float edgeGlow=exp(-minD*18.)*uGlow;
    // Interior volumetric — soft fill inside SDF
    float interior=exp(-minD*6.)*.4;
    // Chromatic aberration: shift RGB slightly on axis
    float chroma=sin(minD*22.+uTime*1.8)*.15+.85;
    vec3 col=uCol*(edgeGlow+interior);
    col.r*=chroma; col.b*=(2.-chroma);
    // Fresnel-style rim from ray angle
    float rim=pow(1.-abs(dot(normalize(vWorldPos-uCamPos),vec3(0,1,0))),3.)*.5;
    col+=uCol*rim*uGlow;

    // Discard fully transparent pixels
    float alpha=(edgeGlow+interior*.6+rim*.3);
    if(alpha<0.01) discard;
    gl_FragColor=vec4(col,min(alpha,0.92));
  }`;

const merkabas=[];
MERKABA_DEFS.forEach(({hue,r},i)=>{
  const col=new THREE.Color().setHSL(hue,.92,.58);
  const mU={
    uCamPos:{value:new THREE.Vector3()},
    uCol:{value:new THREE.Vector3(col.r,col.g,col.b)},
    uTime:{value:0},
    uGlow:{value:0.7},
    uSize:{value:r*1.8},
  };
  // Billboard quad — size in world units matches SDF bounds
  const quad=new THREE.Mesh(
    new THREE.PlaneGeometry(r*4.2,r*4.2),
    new THREE.ShaderMaterial({
      uniforms:mU,
      vertexShader:MERKABA_VERT,
      fragmentShader:MERKABA_FRAG,
      transparent:true, depthWrite:false,
      blending:THREE.AdditiveBlending,
      side:THREE.DoubleSide
    })
  );

  // Point light — rides with the quad
  const ml=new THREE.PointLight(col.getHex(),.7,7);
  const grp=new THREE.Group();
  grp.add(quad); grp.add(ml);

  const ang=(i/MERKABA_DEFS.length)*Math.PI*2;
  const dist=9+Math.random()*12;
  grp.position.set(Math.sin(ang)*dist, 4+Math.random()*7, Math.cos(ang)*dist);
  grp.userData={phase:Math.random()*Math.PI*2, speed:.18+Math.random()*.14,
    baseY:grp.position.y, baseAng:ang, dist, hue, mU, ml, col};
  scene.add(grp);
  merkabas.push(grp);
});

// Petal counts per classical tantra — declared here so both
// buildPadma3D (3-D) and makePadmaSVG (2-D buttons) can use them.
const PADMA_PETALS=[4,6,10,12,16,2,24];

// ── 3-D CHAKRA PADMA / YANTRA — floats in front of viewer ───────────────────
// Each yantra is a THREE.Group of flat MeshStandardMaterial geometry
// so the chakra's point-light rakes across it with real shading.
// The group lives in world-space; each frame we billboard it to face the cam
// and place it 3.5 units in front of the camera at eye level.
const padmaGrps=[];
const PADMA_SCALE=3.2;  // crown-halo: fits over head, clear of mudra sculptures

function buildPadma3D(idx){
  const col = new THREE.Color(CK[idx].hex);
  const n   = PADMA_PETALS[idx];
  const grp = new THREE.Group();
  const PR  = PADMA_SCALE;
  const D   = PR * 0.06;

  const mat  = ()=> new THREE.MeshStandardMaterial({
    color:new THREE.Color(col).multiplyScalar(.30),
    emissive:col, emissiveIntensity:.28, roughness:.28, metalness:.18,
    envMapIntensity:.6
  });
  const wmat = ()=> new THREE.MeshStandardMaterial({
    color:new THREE.Color(col).multiplyScalar(.7),
    emissive:col, emissiveIntensity:.72, roughness:.12, metalness:.30,
    envMapIntensity:.8
  });

  const EXT = (d)=>({
    depth:d||D, bevelEnabled:true,
    bevelThickness:D*.2, bevelSize:D*.12, bevelSegments:2
  });

  // ── ROTATION STRATEGY ──────────────────────────────────────────────────────
  // All geometry is built in Three.js XY plane (Shape default).
  // ExtrudeGeometry pushes it along +Z.
  // We want everything lying FLAT (face pointing +Y) in world space.
  //
  // WRONG: mesh.rotation.x=-PI/2 then mesh.rotation.y=-a
  //   → Euler XYZ applies Ry in the *already tilted local frame* after Rx.
  //   → The Y-rotation spins around the wrong axis. Petals don't point radially.
  //
  // CORRECT: one flat wrapper group per petal ring.
  //   wrapper.rotation.x = -PI/2   → lays the XY plane flat into world XZ
  //   child.rotation.z   = a       → in wrapper's local XY, Z-rot = world Y-rot
  //   child.position     = (cos(a)*r, sin(a)*r, 0)  → in wrapper local XY = world XZ
  //
  // For non-petal pieces (rings, disc, bars) that don't need radial rotation:
  //   just mesh.rotation.x = -PI/2 is fine — they're radially symmetric.

  const flatShape = (shapeObj, depth, m)=>{
    const mesh=new THREE.Mesh(new THREE.ExtrudeGeometry(shapeObj, EXT(depth)), m());
    mesh.rotation.x=-Math.PI/2;
    return mesh;
  };

  const flatRing = (R, r, m)=>{
    const s=new THREE.Shape(); s.absarc(0,0,R,0,Math.PI*2,false);
    const h=new THREE.Path();  h.absarc(0,0,r,0,Math.PI*2,true); s.holes.push(h);
    return flatShape(s, D, m);
  };

  const flatDisc = (r, m)=>{
    const s=new THREE.Shape(); s.absarc(0,0,r,0,Math.PI*2,false);
    return flatShape(s, D*.45, m);
  };

  // Almond: 1.6:1 ratio, long axis along X in XY plane.
  // Two quadratic bezier curves — no arc angle math, no crossing arcs.
  const almondShape = (pLen)=>{
    const hl=pLen/2, hw=pLen/3.2;
    const s=new THREE.Shape();
    s.moveTo(-hl, 0);
    s.quadraticCurveTo( 0,  hw,  hl, 0);
    s.quadraticCurveTo( 0, -hw, -hl, 0);
    s.closePath();
    return s;
  };

  const flatBar = (len, thick, m)=>{
    const hl=len/2, ht=thick/2;
    const s=new THREE.Shape();
    s.moveTo(-hl,-ht); s.lineTo(hl,-ht); s.lineTo(hl,ht); s.lineTo(-hl,ht); s.closePath();
    return flatShape(s, D*.6, m);
  };

  const flatTri = (r, rot)=>{
    const g=new THREE.Group();
    for(let k=0;k<3;k++){
      const a0=(k/3)*Math.PI*2+rot, a1=((k+1)/3)*Math.PI*2+rot;
      const x0=Math.cos(a0)*r, y0=Math.sin(a0)*r;
      const x1=Math.cos(a1)*r, y1=Math.sin(a1)*r;
      const len=Math.sqrt((x1-x0)**2+(y1-y0)**2);
      const b=flatBar(len, PR*.038, wmat);
      // flatBar already has rotation.x=-PI/2 applied.
      // To position and orient it we use a wrapper:
      const wb=new THREE.Group();
      wb.rotation.x=-Math.PI/2;
      b.rotation.x=0;  // undo the flatBar rotation since wrapper handles it
      b.rotation.z=-Math.atan2(y1-y0, x1-x0);
      b.position.set((x0+x1)/2, (y0+y1)/2, 0);
      wb.add(b); g.add(wb);
    }
    return g;
  };

  // Petal ring: n almond petals laid flat, each pointing radially outward.
  // Uses wrapper group pattern to avoid Euler order issues.
  const petalRing = (count, pLen, radius, aOff)=>{
    // One wrapper for the whole ring — rotation.x=-PI/2 lays everything flat.
    const ring=new THREE.Group();
    ring.rotation.x=-Math.PI/2;
    for(let i=0;i<count;i++){
      const a=(i/count)*Math.PI*2+(aOff||0);
      const mesh=new THREE.Mesh(
        new THREE.ExtrudeGeometry(almondShape(pLen), EXT(D)),
        mat()
      );
      // In ring's local XY: rotate around Z to point radially, position in XY.
      mesh.rotation.z = a;              // Z-rot in wrapper = Y-rot in world ✓
      mesh.position.set(Math.cos(a)*radius, Math.sin(a)*radius, 0);
      ring.add(mesh);
    }
    grp.add(ring);
  };

  // ── BUILD ──────────────────────────────────────────────────────────────────
  if(idx===5){
    // AJNA — 2-petal eye (mandorla). Reference: two SOLID convex leaf shapes,
    // top petal bulges up, bottom petal bulges down, tips meet left & right.
    // Each petal = single outer bezier arc closed by a straight chord (lineTo).
    // NO inner counter-arc — that was making it a crescent sliver.
    // Aspect: wide 3:1. aL=PR*1.8 tip-to-tip, hw=PR*0.62 per half (fat but not semicircle).
    //
    // Wrapper XY → world XZ (rotation.x=-PI/2). Long axis along X.
    const ajnaW=new THREE.Group();
    ajnaW.rotation.x=-Math.PI/2;
    const aL = PR * 1.8;   // total width tip-to-tip
    const hl  = aL / 2;
    const hw  = PR * 0.62; // height of each leaf half — fat solid leaf

    // mkLeaf(sign): +1=top petal bulges +Y (world +Z), -1=bottom bulges -Y.
    // Single outer bezier from left-tip to right-tip, closed straight back.
    const mkLeaf = (sign) => {
      const s = new THREE.Shape();
      s.moveTo(-hl, 0);
      // One cubic bezier sweeps to peak at centre. Control points pulled far
      // outward (x: ±hl*0.35) so arc is round, not pointed at shoulders.
      s.bezierCurveTo(
        -hl * 0.35, sign * hw,   // cp1 — far out + full height
         hl * 0.35, sign * hw,   // cp2 — mirror
         hl, 0                   // right tip
      );
      // Close straight back along shared chord (y=0). No inner arc.
      s.lineTo(-hl, 0);
      s.closePath();
      return s;
    };

    [1, -1].forEach(sign => {
      const mesh = new THREE.Mesh(
        new THREE.ExtrudeGeometry(mkLeaf(sign), EXT(D * 0.9)), mat());
      ajnaW.add(mesh);
    });
    grp.add(ajnaW);

    // Inner detail: ring + downward triangle + centre dot (all flat, at y=0).
    grp.add(flatRing(PR * .30, PR * .20, wmat));
    grp.add(flatTri(PR * .34, Math.PI));   // PI → apex points -Y (downward)
    grp.add(flatDisc(PR * .07, wmat));
  } else {
    // Scale petal size inversely with count so every chakra looks like root.
    // pLen = 0.52*PR * sqrt(4/n)  — root (n=4) stays at PR*0.52, others shrink gracefully.
    // pOff = PR*0.74 - pLen/2     — outer tip always at ~PR*0.74 regardless of n.
    const pLen = PR * 0.52 * Math.sqrt(4/n);
    const pOff = PR * 0.74 - pLen/2;
    petalRing(n, pLen, pOff, 0);

    grp.add(flatRing(PR*.20, PR*.14, wmat));
    grp.add(flatRing(PR*.84, PR*.79, mat));
    grp.add(flatDisc(PR*.058, wmat));

    if(idx===0){
      // Earth square: 4 bars forming a square, using wrapper pattern
      const sqW=new THREE.Group(); sqW.rotation.x=-Math.PI/2;
      const s=PR*.57;
      const C=[[s,s],[s,-s],[-s,-s],[-s,s]];
      C.forEach((_,k)=>{
        const [x0,y0]=C[k],[x1,y1]=C[(k+1)%4];

        const bs=new THREE.Shape();
        bs.moveTo(-hl,-ht); bs.lineTo(hl,-ht); bs.lineTo(hl,ht); bs.lineTo(-hl,ht); bs.closePath();

        bm.rotation.z=-Math.atan2(y1-y0,x1-x0);
        bm.position.set((x0+x1)/2,(y0+y1)/2,0);

      });

    if(idx===3){ grp.add(flatTri(PR*.42,0)); grp.add(flatTri(PR*.42,Math.PI)); }

      // Inner rings sit HIGHER than outer rings — like a crown/dome shape.
      // Each ring is a petalRing but wrapped in a group elevated on Y.
      // Ring spec: [count, petalLen, radius, angularOffset, yElevation]
      const rings=[
        [ 8, PR*.30, PR*.14, 0,           PR*.32],
        [12, PR*.28, PR*.28, Math.PI/12,  PR*.24],
        [16, PR*.26, PR*.42, Math.PI/16,  PR*.16],
        [20, PR*.24, PR*.56, Math.PI/20,  PR*.09],
        [24, PR*.22, PR*.70, Math.PI/24,  PR*.03],
        [28, PR*.20, PR*.83, Math.PI/28,  0     ],

// Petal counts follow classical tantric tradition:
// Muladhara=4, Svadhisthana=6, Manipura=10, Anahata=12,
// Vishuddha=16, Ajna=2 (wings/petals + bindu), Sahasrara=display as 24 dense
function makePadmaSVG(idx){
  const ck=CK[idx];
  const n=PADMA_PETALS[idx];
  const cx=50,cy=50,R=22,r=10,ir=7;
  const c=ck.css;
  let paths='';

  if(idx===5){
    // Ajna — two large wing-petals + centre circle + downward triangle (bindu)
    // Left wing
    paths+=`<path d="M50,50 C30,28 14,36 18,50 C14,64 30,72 50,50Z"
      fill="none" stroke="${c}" stroke-width="1.4" opacity=".9"/>`;
    // Right wing
    paths+=`<path d="M50,50 C70,28 86,36 82,50 C86,64 70,72 50,50Z"
      fill="none" stroke="${c}" stroke-width="1.4" opacity=".9"/>`;
    // Centre circle
    paths+=`<circle cx="50" cy="50" r="9" fill="none" stroke="${c}" stroke-width="1.2"/>`;
    // Bindu dot
    paths+=`<circle cx="50" cy="50" r="2.5" fill="${c}" opacity=".95"/>`;
    // Downward triangle (trikona)
    paths+=`<polygon points="50,42 58,56 42,56" fill="none" stroke="${c}" stroke-width="1"/>`;
  } else {
    // Standard lotus: N petals as elliptical lobes arranged radially
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2 - Math.PI/2;
      // Each petal: an ellipse centred between inner ring and outer ring
      const pc=R*.62; // petal centre distance from origin
      const px=cx+Math.cos(a)*pc, py=cy+Math.sin(a)*pc;
      const pw=R*.38, ph=R*.58; // petal width / height in local coords
      // Rotate the ellipse to point outward
      const deg=(a*180/Math.PI)+90;
      paths+=`<ellipse cx="${px.toFixed(1)}" cy="${py.toFixed(1)}"
        rx="${pw.toFixed(1)}" ry="${ph.toFixed(1)}"
        transform="rotate(${deg.toFixed(1)},${px.toFixed(1)},${py.toFixed(1)})"
        fill="none" stroke="${c}" stroke-width="1.15" opacity=".88"/>`;
    }
    // Inner circle (pericarp)
    paths+=`<circle cx="${cx}" cy="${cy}" r="${ir}" fill="none" stroke="${c}" stroke-width="1.1"/>`;
    // Bindu (seed point)
    paths+=`<circle cx="${cx}" cy="${cy}" r="2.2" fill="${c}" opacity=".9"/>`;
    // For Solar Plexus (10 petals) add inner downward triangle
    if(idx===2){
      paths+=`<polygon points="50,41 58,55 42,55" fill="none" stroke="${c}" stroke-width=".9" opacity=".7"/>`;
    }
    // For Heart (12 petals) add Star of David (two triangles = air/vayu yantra)
    if(idx===3){
      paths+=`<polygon points="50,40 58,55 42,55" fill="none" stroke="${c}" stroke-width=".9" opacity=".7"/>`;
      paths+=`<polygon points="50,60 58,45 42,45" fill="none" stroke="${c}" stroke-width=".9" opacity=".7"/>`;
    }
    // For Throat (16) add inner circle + downward triangle
    if(idx===4){
      paths+=`<circle cx="50" cy="50" r="13" fill="none" stroke="${c}" stroke-width=".8" opacity=".55"/>`;
      paths+=`<polygon points="50,43 57,54 43,54" fill="none" stroke="${c}" stroke-width=".85" opacity=".65"/>`;
    }
    // For Crown — add concentric ring to suggest thousand petals
    if(idx===6){
      paths+=`<circle cx="50" cy="50" r="14" fill="none" stroke="${c}" stroke-width=".7" opacity=".4"/>`;
      paths+=`<circle cx="50" cy="50" r="20" fill="none" stroke="${c}" stroke-width=".55" opacity=".28"/>`;
    }
  }
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"
    style="filter:drop-shadow(0 0 4px ${c}88)">${paths}</svg>`;
}

function _initAnalyser(){

  // via a silent side chain — just connect destination

  // Simpler: analyser on a shared gain patched before each play call
  _fft=new Uint8Array(_analyser.frequencyBinCount);

}
function _bandAvg(fa,fb){
  if(!_analyser||!_fft)return 0;
  const ny=actx.sampleRate/2;
  const iA=Math.floor(fa/ny*_fft.length);
  const iB=Math.floor(fb/ny*_fft.length);
  let sum=0,count=0;
  for(let i=iA;i<=iB;i++){sum+=_fft[i]/255;count++;}
  return count?sum/count:0;
}
function _smth(old_,new_,a){return old_+(new_-old_)*a;}
function _updateAudio(){
  if(!_analyser){_initAnalyser();return;}
  _analyser.getByteFrequencyData(_fft);

    } else {
      // Rings 1–3 expand outward as before
      const p=((t*.18+(i/ERING))%1);const sc=2+p*15;
      r.scale.set(sc,sc,1);
      eRingMats[i].opacity=(aIdx>=0?.14:.06)*(1-p)*(1-p);
      if(aIdx>=0) eRingMats[i].color.set(CK[aIdx].hex);
      else eRingMats[i].color.set(0x003366);
    }
  });
  islandColMat.opacity=.018+.01*Math.sin(t*.45)+(aIdx>=0?.025+.015*Math.sin(t*4.):0);
  tLights.forEach((l,i)=>l.intensity=2.9*(1+.38*Math.sin(t*8.8+i*2.3)+.16*Math.sin(t*17.2+i*3.7)));
  fMesh.forEach((f,i)=>{const s=.72+.44*Math.sin(t*9.5+i*2.9)+.18*Math.sin(t*18.1+i*1.4);f.scale.setScalar(s);f.position.y=14.54+.11*Math.sin(t*12.2+i*3.1)});
  fCore.forEach((f,i)=>f.position.y=14.65+.12*Math.sin(t*13.6+i*2.2));
  cMesh.forEach((c,i)=>{c.rotation.y=t*.44+(i/N)*Math.PI*2;c.material.emissiveIntensity=i===aIdx?2.8*(1+.4*Math.sin(t*4.)):(.58+.22*Math.sin(t*.82+i*.95))});
  // Glow halos — face camera, pulse on active
  glowMesh.forEach((g,i)=>{
    g.quaternion.copy(cam.quaternion);
    const isAct=i===aIdx;
    const pulse=Math.sin(t*3.5+i);
    const sc=isAct?1.0+0.18*pulse:0.72+0.06*Math.sin(t*.7+i);
    g.scale.setScalar(sc);
    g.material.opacity=isAct?0.22+0.10*Math.abs(pulse):0.06+0.02*Math.sin(t*.5+i);
  });
  angRays.forEach((r,i)=>r.material.opacity=i===aIdx?.15+.08*Math.sin(t*4.):.052+.018*Math.sin(t*.6+i*.82));
  atmRays.forEach((r,i)=>r.material.opacity=i===aIdx?.045+.022*Math.sin(t*4.):.02+.008*Math.sin(t*.5+i*.7));
  subGlows.forEach((g,i)=>g.material.opacity=i===aIdx?.12+.06*Math.sin(t*4.):.038+.012*Math.sin(t*.6+i*.8));
  wDiscMats.forEach((m,i)=>m.opacity=i===aIdx?.1+.05*Math.sin(t*4.):.032+.01*Math.sin(t*.5+i*.7));
  mudraGrps.forEach((grp,i)=>{
    const isAct=i===aIdx;const pulse=Math.sin(t*3.8);
    grp.position.y=.08+(isAct?.18+.06*Math.abs(pulse):0);
    grp.traverse(c=>{if(!c.isMesh||!c.material||c.material.isMeshBasicMaterial)return;const targetEI=isAct?.55+.35*Math.abs(pulse):.07;c.material.emissiveIntensity+=(targetEI-c.material.emissiveIntensity)*.1});
  });

  // ── Merkaba: Bug-Fairy flight (§7-§9) + SDF shader uniforms ────────────────
  merkabas.forEach((grp,i)=>{
    const ud=grp.userData;
    if(!ud.vel){ ud.vel=new THREE.Vector3(); ud.acc=new THREE.Vector3(); }
    const {phase,speed,baseY,baseAng,dist,hue,mU,ml,col}=ud;
    const dt2=1/60;

    // §7 wing velocity + §ω² physical+magic lift
    const freq=18+Math.sin(t*3.+phase)*2.;
    const strokeAmp=1.1+Math.sin(t*5.+phase)*.08;
    const vWing=2*Math.PI*freq*.22*strokeAmp;
    const physLift=.5*1.225*vWing*vWing*.18*1.8;
    const weight=0.35*9.81;
    const liftNet=(physLift+weight*.35-weight)*0.00035;

    // §6 four forces
    const wx=Math.sin(t*.7+phase*1.3)*.014+Math.sin(t*1.1+phase*.7)*.006;
    const wz=Math.cos(t*.9+phase*1.7)*.014+Math.cos(t*1.3+phase*.5)*.006;
    const wy=Math.sin(t*4.+phase)*.005+liftNet;
    const tx2=Math.sin(baseAng+t*.012*speed)*dist;
    const tz2=Math.cos(baseAng+t*.012*speed)*dist;
    const toX=(tx2-grp.position.x)*.010;
    const toZ=(tz2-grp.position.z)*.010;
    const toY=(baseY-grp.position.y)*.007+wy;
    const pr=Math.sqrt(grp.position.x**2+grp.position.z**2);
    const avX=pr<7?grp.position.x/Math.max(pr,.1)*.03:0;
    const avZ=pr<7?grp.position.z/Math.max(pr,.1)*.03:0;

    // §ω7 Euler
    ud.acc.set(toX+wx+avX, toY, toZ+wz+avZ);
    ud.vel.addScaledVector(ud.acc,dt2);
    ud.vel.multiplyScalar(.90);
    grp.position.addScaledVector(ud.vel,dt2*60);

    // §9 glow model
    const spd=ud.vel.length()*60;
    const slowPulse=.5+.5*Math.sin(t*2.2+phase);
    const flicker=Math.sin(t*12.+phase*3.)*.10;
    const speedGlow=Math.min(spd/.06,1.)*.28;
    const glow=Math.min(slowPulse+flicker+speedGlow,1.);

    // Billboard: always face camera (important for SDF quads)
    grp.quaternion.copy(cam.quaternion);

    // Update SDF shader uniforms
    if(mU){
      mU.uTime.value=t;
      mU.uGlow.value=glow*(aIdx>=0?.95:.55);
      mU.uCamPos.value.copy(cam.position);
      // Chakra colour tint when active
      if(aIdx>=0){
        const ckc=new THREE.Color(CK[aIdx].hex);
        mU.uCol.value.set(
          col.r*.6+ckc.r*.4,
          col.g*.6+ckc.g*.4,
          col.b*.6+ckc.b*.4
        );
      } else {
        mU.uCol.value.set(col.r,col.g,col.b);
      }
    }
    // Point light
    if(ml){
      ml.intensity=glow*(aIdx>=0?1.1:.38);
      ml.color.setHSL(hue+speedGlow*.08,.9,.55+glow*.12);
    }
  });
  // Bioluminescent drip splashes — bob at surface
  for(let i=0;i<SPLASH_N;i++){
    splashT[i]+=splashV[i];
    if(splashT[i]>3.0){
      const a=Math.random()*Math.PI*2,r=10+Math.random()*32;
      splashPos[i*3]=Math.sin(a)*r; splashPos[i*3+1]=.08; splashPos[i*3+2]=Math.cos(a)*r;
      splashT[i]=0;
    }
    splashPos[i*3+1]=.08+Math.sin(splashT[i]*6.)*Math.max(0,.3-splashT[i]*.15)*.4;
  }
  splashAttr.needsUpdate=true;
  _orbFairyUpdate(_dt,t); // Bug-Fairy flight replaces naive orbit (doc §⑦)
  if(aIdx>=0){
    const ck=CK[aIdx],pulse=Math.sin(t*4.);
    aLights[aIdx].intensity=5.2*(1+.44*pulse);cLight.intensity=2.1*(1+.42*pulse);wGlow.intensity=.68+.32*Math.abs(pulse);
    poolMat.opacity=.22+.12*Math.abs(pulse);auM1.opacity=.3+.18*pulse;auM2.opacity=.14+.08*Math.sin(t*4.+.65);
    islMat.emissive.set(ck.hex);islMat.emissiveIntensity=.07+.05*Math.sin(t*Math.PI*2*(1+3*(ck.freq-396)/567));
    auR1.rotation.z=t*.12;auR2.rotation.z=-t*.09;
  } else {
    islMat.emissiveIntensity=Math.max(0,islMat.emissiveIntensity*.93);
    poolMat.opacity=Math.max(0,poolMat.opacity*.92);
    auM1.opacity=Math.max(0,auM1.opacity*.9);auM2.opacity=Math.max(0,auM2.opacity*.9);
    cLight.intensity=Math.max(0,cLight.intensity*.92);wGlow.intensity=Math.max(.55,wGlow.intensity*.96);
  }
  wfPosArr.forEach((pos,wi)=>{const vel=wfVels[wi];const{x,z}=wfData[wi];for(let i=0;i<WF_N;i++){pos[i*3+1]-=vel[i];if(pos[i*3+1]<.04){const a=Math.random()*Math.PI*2,r=Math.random()*.68;pos[i*3]=x+Math.cos(a)*r;pos[i*3+1]=20+Math.random()*5;pos[i*3+2]=z+Math.sin(a)*r}}wfAttrs[wi].needsUpdate=true});

  // ── Ember drift update ────────────────────────────────────────────────────
  if(aIdx>=0){
    const _pa=(aIdx/7)*Math.PI*2;
    const _px=Math.sin(_pa)*OR, _pz=Math.cos(_pa)*OR;
    embMat.color.set(CK[aIdx].hex);
    embMat.opacity=.72;
    // Spawn ~2 new embers per frame from dead pool
    let spawned=0;
    for(let i=0;i<EMB_N&&spawned<2;i++){if(embAge[i]>=1){_spawnEmb(i,_px,_pz);spawned++;}}
    // Advance all live embers
    for(let i=0;i<EMB_N;i++){
      if(embAge[i]>=1)continue;
      const dt2=0.016; // fixed step ~60fps
      embPos[i*3]  +=embVel[i*3]*dt2*60;
      embPos[i*3+1]+=embVel[i*3+1]*dt2*60;
      embPos[i*3+2]+=embVel[i*3+2]*dt2*60;
      embVel[i*3]  *=0.98; // gentle drag
      embVel[i*3+2]*=0.98;
      embAge[i]=Math.min(1,embAge[i]+(dt2/embLife[i]));
      // Park spent embers
      if(embAge[i]>=1){embPos[i*3+1]=-999;}
    }
  } else {
    embMat.opacity=0;
    for(let i=0;i<EMB_N;i++){embAge[i]=1;embPos[i*3+1]=-999;}
  }
  embAttr.needsUpdate=true;
  for(let i=0;i<DRIP_N;i++){dripP[i*3+1]-=dripV[i];if(dripP[i*3+1]<.05){
    // Drip hit water — queue impulse (doc §④)
    const _uv=_worldToUV(dripP[i*3],dripP[i*3+2]);
    _queueImpulse(_uv.u,_uv.v,0.04+Math.random()*0.03);
    dripP[i*3]=dripBX[i]+(Math.random()-.5)*.4;dripP[i*3+1]=dripBY[i];dripP[i*3+2]=dripBZ[i]+(Math.random()-.5)*.4;
  }}
  _flushImpulse(); // write one impulse per frame into GPU water sim
  dripAttr.needsUpdate=true;
  for(let i=0;i<MIST_N;i++){mistPos[i*3]+=mistVX[i];mistPos[i*3+1]+=.0025;mistPos[i*3+2]+=mistVZ[i];if(mistPos[i*3+1]>4.||Math.abs(mistPos[i*3])>40||Math.abs(mistPos[i*3+2])>40){const a=Math.random()*Math.PI*2,r=2+Math.random()*32;mistPos[i*3]=Math.sin(a)*r;mistPos[i*3+1]=.08;mistPos[i*3+2]=Math.cos(a)*r;mistVX[i]=(Math.random()-.5)*.008;mistVZ[i]=(Math.random()-.5)*.008}}
  mAttr.needsUpdate=true;
  for(let i=0;i<DN;i++){dustP[i*3+1]+=.0034;if(dustP[i*3+1]>26)dustP[i*3+1]=0}dAttr.needsUpdate=true;
  if(!drag){cThTarget+=.00015;reC()}
  // Smoothly rotate figure toward its target pillar
  figTh+=(figThTarget-figTh)*.055;
  figGrp.rotation.y=figTh;

  // ── PADMA placement ──────────────────────────────────────────────────────
  // The yantra always lives in world-space anchored to the figure,
  // never relative to the camera — that's what caused the z-clipping.
  //
  // Fixed position:  (0, 5.2, 1.8)  — two feet above the figure's head,
  //                                    one foot toward the viewer along Z.
  // Fixed rotation:  -25° on X so it faces slightly downward toward
  //                  the seated meditator from the viewer's perspective.
  // In MUDRA mode the camera orbits closer so the symbol reads large;
  // the symbol itself does NOT move — the camera does.
  if(aIdx>=0 && padmaGrps[aIdx].visible){
    const pulse  = Math.sin(t * 2.2);
    const breath = Math.sin(t * 0.38);          // slow breath cycle
    const shimmy = Math.sin(t * 1.1) * 0.008;   // tiny jitter on Z
    const wobble = Math.cos(t * 0.73) * 0.006;  // micro wobble on X
    const pg     = padmaGrps[aIdx];

    if(viewMode===2){
      // MUDRA: crown-attached, tilts to face camera. Jitter adds organic life.
      pg.position.set(wobble, 4.2 + breath*0.04, shimmy);
      pg.rotation.set(
        -(Math.PI/2 - 0.38) + wobble,
        cTh - figTh + Math.PI,
        shimmy
      );
      padmaLight.position.set(0, 5.5, 0);
      pg.scale.setScalar(0.82 + 0.03*Math.abs(pulse) + 0.015*breath);
    } else {
      // ORBIT / TOP: flat halo, slow spin + breath scale + micro float.
      pg.position.set(wobble, 4.2 + breath*0.05, shimmy);
      pg.rotation.set(
        Math.PI/6 + wobble,
        t*0.10,
        shimmy
      );
      padmaLight.position.set(0, 5.5, 0);
      pg.scale.setScalar(0.65 + 0.04*Math.abs(pulse) + 0.018*breath);
    }
    padmaLight.intensity = 3.5*(1 + 0.28*pulse);
  }

  // ── CAMERA overrides ─────────────────────────────────────────────────────
  if(viewMode===2){
    // MUDRA cam: uses cTh/cPh just like orbit, but closer and looking at padma.
    // Snap-to-pillar sets cThTarget → camera orbits around to face that pillar
    // from the outside, then looks at the padma which floats in front of the figure.
    // The padma itself also faces cTh (see padma block above) so it always faces you.
    const mR=16; // mudra orbit radius
    cam.position.set(
      CT.x + mR*Math.sin(cPh)*Math.sin(cTh),
      4.8,
      CT.z + mR*Math.sin(cPh)*Math.cos(cTh)
    );
    cam.lookAt(new THREE.Vector3(0, 4.1, 0));
  } else if(viewMode===3){
    // ── VR STEREO MODE ────────────────────────────────────────────────────
    // Side-by-side split with barrel distortion overlay.
    // Both eye cameras sit at head height, separated by IPD (0.063 m ≈ 0.32 units).
    const IPD=0.32;
    const mR_vr=16;
    const eyePos  = new THREE.Vector3(CT.x+mR_vr*Math.sin(cPh)*Math.sin(cTh), 4.8, CT.z+mR_vr*Math.sin(cPh)*Math.cos(cTh));
    const lookTgt = new THREE.Vector3(0, 4.1, 0); // padma face centre
    // We render into two halves of the canvas using scissor/viewport.
    // Left eye
    renderer.setScissorTest(true);
    const W=innerWidth,H=innerHeight;
    // LEFT EYE
    renderer.setViewport(0,0,W/2,H);
    renderer.setScissor(0,0,W/2,H);
    cam.position.set(eyePos.x-IPD/2,eyePos.y,eyePos.z);
    cam.lookAt(lookTgt);
    renderer.render(scene,cam);
    // RIGHT EYE
    renderer.setViewport(W/2,0,W/2,H);
    renderer.setScissor(W/2,0,W/2,H);
    cam.position.set(eyePos.x+IPD/2,eyePos.y,eyePos.z);
    cam.lookAt(lookTgt);
    renderer.render(scene,cam);
    renderer.setScissorTest(false);
    renderer.setViewport(0,0,W,H);
    renderer.setScissor(0,0,W,W);
  }
  // Store head x for VR (avoids referencing before declare)
  const hx_vr = Math.sin(cTh)*0.01;

  // Ortho camera tracks aspect on resize (handled in resize listener)
  if(viewMode!==3){
    renderer.render(scene,activeCam);
  }
})();

window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  const s=orthoSize;
  camOrtho.left=-s*cam.aspect;camOrtho.right=s*cam.aspect;
  camOrtho.top=s;camOrtho.bottom=-s;camOrtho.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  // Composer resize
});
setTimeout(()=>{const l=document.getElementById('load');l.classList.add('out');setTimeout(()=>l.remove(),1300)},1200);
}catch(e){
  document.body.innerHTML='<div style="position:fixed;inset:0;background:#000;color:#f44;font:13px monospace;padding:20px;white-space:pre-wrap;z-index:9999">CRASH:\n'+e.message+'\n\n'+e.stack+'</div>';
}
</script>
</body>
