<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sacred Chamber — Zora's Domain</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cinzel+Decorative&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000414;font-family:'Cinzel',Georgia,serif}
#hud{position:fixed;top:0;left:0;right:0;padding:18px 16px 0;text-align:center;pointer-events:none;z-index:10}
#hTitle{font-family:'Cinzel Decorative',serif;font-size:clamp(11px,1.9vw,22px);letter-spacing:5px;color:#fff;text-transform:uppercase;text-shadow:0 0 70px currentColor,0 0 25px currentColor;transition:color .9s}
#hSub{font-size:clamp(8px,1.1vw,11px);color:rgba(180,210,255,.42);margin-top:7px;letter-spacing:2.5px;transition:color .8s}
#hHint{font-size:8px;color:rgba(255,255,255,.12);margin-top:9px;letter-spacing:1.5px}
#btns{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:9px;z-index:10}
.cbtn{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.14);cursor:pointer;transition:all .35s;position:relative;flex-shrink:0}
.cbtn:hover{transform:scale(1.15);border-color:rgba(255,255,255,.55)}
.cbtn.on{border-color:#fff}
.cbtn.on::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1.5px solid currentColor;animation:rp 2s ease-out infinite}
@keyframes rp{0%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(1.82)}}
#snd{position:fixed;top:15px;right:15px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);color:rgba(180,210,255,.4);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;user-select:none}
#snd:hover,#snd.on{border-color:rgba(80,160,255,.5);color:rgba(130,200,255,.9)}
#tip{position:fixed;pointer-events:none;background:rgba(0,4,22,.88);padding:4px 12px;border-radius:2px;font-size:9px;letter-spacing:2.2px;border:1px solid rgba(80,140,255,.18);display:none;z-index:20;white-space:nowrap;text-transform:uppercase}
#load{position:fixed;inset:0;background:#000414;z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:rgba(70,150,220,.45);font-size:11px;letter-spacing:4px;text-transform:uppercase;transition:opacity 1.2s;font-family:'Cinzel Decorative',serif}
#load .g{font-size:30px;animation:gp 2.4s ease-in-out infinite}
@keyframes gp{0%,100%{opacity:.25;transform:scale(.88)}50%{opacity:.75;transform:scale(1.1)}}
#load.out{opacity:0;pointer-events:none}

#vBtn{position:fixed;top:15px;left:15px;z-index:10;padding:5px 11px;border-radius:3px;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);color:rgba(180,210,255,.55);
  font-size:8px;letter-spacing:2px;cursor:pointer;font-family:'Cinzel',serif;text-transform:uppercase;
  transition:all .3s;user-select:none}
#vBtn:hover{border-color:rgba(80,160,255,.5);color:rgba(130,200,255,.9)}
/* Padma button icons override */
.cbtn svg{width:26px;height:26px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;opacity:.82;transition:opacity .35s}
.cbtn:hover svg,.cbtn.on svg{opacity:1}
</style>
</head>
<body>
<div id="load"><div class="g">⬡</div><div>Summoning the Sacred Waters</div></div>
<div id="hud">
  <div id="hTitle">Sacred Chamber</div>

</div>
<div id="btns"></div>
<div id="vBtn" title="Cycle view (V)">ORBIT</div>
<div id="snd" title="Binaural tones + water ambience">♪</div>

let actx=null,aN=[],sndOn=false,wNoise=null;
const iA=()=>{if(!actx)actx=new(AudioContext||webkitAudioContext)()};
const stopA=()=>{const t=actx?actx.currentTime:0;aN.forEach(({o,g})=>{try{g.gain.linearRampToValueAtTime(0,t+1)}catch(e){}setTimeout(()=>{try{o.stop()}catch(e){}},1100)});aN=[]};
const startWater=()=>{if(!actx||wNoise)return;const bL=actx.sampleRate*4;const buf=actx.createBuffer(2,bL,actx.sampleRate);for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<bL;i++)d[i]=Math.random()*2-1}wNoise=actx.createBufferSource();wNoise.buffer=buf;wNoise.loop=true;const lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=500;const hp=actx.createBiquadFilter();hp.type='highpass';hp.frequency.value=80;const wg=actx.createGain();wg.gain.value=.036;wNoise.connect(lp);lp.connect(hp);hp.connect(wg);wg.connect(actx.destination);wNoise.start()};
const stopWater=()=>{if(wNoise){try{wNoise.stop()}catch(e){}wNoise=null}};
const playA=fr=>{if(!actx||!sndOn)return;stopA();const t=actx.currentTime;[[fr*.5,.036,'sawtooth'],[fr,.055,'sine'],[fr*2,.022,'sine'],[fr+7,.028,'sine'],[fr*.25,.016,'triangle']].forEach(([f,a,tp])=>{const o=actx.createOscillator(),g=actx.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(a,t+2.2);o.connect(g);g.connect(actx.destination);o.start();aN.push({o,g})})};
document.getElementById('snd').addEventListener('click',()=>{iA();sndOn=!sndOn;const b=document.getElementById('snd');b.textContent=sndOn?'♪':'♩';b.classList.toggle('on',sndOn);if(!sndOn){stopA();stopWater()}else{startWater();if(aIdx>=0)playA(CK[aIdx].freq)}if(actx&&actx.state==='suspended')actx.resume()});

const aM=(geo,mat,x,y,z,par)=>{const m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);par.add(m);return m};

const ambL=new THREE.AmbientLight(0x06182a,.65);scene.add(ambL);
scene.add(new THREE.HemisphereLight(0x0a2040,0x04080e,.38));

aM(new THREE.SphereGeometry(54,32,22,0,Math.PI*2,0,Math.PI*.65),new THREE.MeshStandardMaterial({color:0x090c12,roughness:1,side:THREE.BackSide}),0,3,0,scene);
{const m=new THREE.Mesh(new THREE.CircleGeometry(52,72),new THREE.MeshStandardMaterial({color:0x0b0d11,roughness:.98}));m.rotation.x=-Math.PI/2;m.position.y=-5;scene.add(m)}

const dWU={uTime:{value:0},uColor:{value:new THREE.Color(0x001428)}};
{const m=new THREE.Mesh(new THREE.PlaneGeometry(92,92,1,1),new THREE.ShaderMaterial({uniforms:dWU,
  vertexShader:`varying vec2 vU;void main(){vU=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`uniform float uTime;uniform vec3 uColor;varying vec2 vU;
    float cs(vec2 p){return sin(p.x*6.+uTime)*cos(p.y*5.5-uTime*.88)+sin(p.x*3.5-uTime*.78)*cos(p.y*7.1+uTime*.62)+sin(p.x*9.2+uTime*1.1)*cos(p.y*3.8-uTime*.72)*.6;}
    void main(){float v=cs(vU*6.2);v=pow(clamp(v*.33+.5,0.,1.),2.6);gl_FragColor=vec4(uColor+vec3(.01,.03,.045)*v,v*.65+.18);}`,
  transparent:true,depthWrite:false}));m.rotation.x=-Math.PI/2;m.position.y=-2.5;scene.add(m)}

const wU={uTime:{value:0},uColor:{value:new THREE.Color(0x002e4a)}};
const wSurf=new THREE.Mesh(new THREE.PlaneGeometry(90,90,88,88),new THREE.ShaderMaterial({uniforms:wU,
  vertexShader:`uniform float uTime;varying vec2 vXY;varying float vH;
    void main(){vXY=position.xy;float r=length(position.xy);
      float h=sin(r*1.55-uTime*1.5)*.16+sin(r*3.1-uTime*.92)*.07+sin(r*.72+uTime*.38)*.05
             +sin(position.x*1.85+uTime*.88)*.04+sin(position.y*2.05-uTime*1.08)*.035+sin(r*5.2-uTime*2.1)*.02;
      vH=h;gl_Position=projectionMatrix*modelViewMatrix*vec4(position.xy,h,1.);}`,
  fragmentShader:`uniform vec3 uColor;varying vec2 vXY;varying float vH;
    void main(){float r=length(vXY);float s=clamp((vH+.22)*2.9,0.,1.);
      vec3 c=mix(uColor*.38,uColor*1.55+vec3(.04,.09,.12),s);c+=pow(s,5.5)*.28*vec3(.2,.55,.9)+pow(s,12.)*.5*vec3(.4,.8,1.);
      float a=.88*(1.-smoothstep(40.,45.,r));gl_FragColor=vec4(c,a);}`,
  transparent:true,side:THREE.DoubleSide,depthWrite:false}));
wSurf.rotation.x=-Math.PI/2;wSurf.position.y=.06;scene.add(wSurf);

{const cB=new THREE.MeshBasicMaterial({color:0x00AACC,transparent:true});
const rB=new THREE.MeshBasicMaterial({color:0x007799,transparent:true});
for(let i=0;i<80;i++){const a=Math.random()*Math.PI*2,h=.5+Math.random()*22,r=36+Math.random()*8;const m=new THREE.Mesh(new THREE.OctahedronGeometry(.06+Math.random()*.28),cB.clone());m.material.opacity=.1+Math.random()*.28;m.position.set(Math.sin(a)*r*.86,h,Math.cos(a)*r*.86);scene.add(m)}
for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,h=4+Math.random()*16,r=34+Math.random()*7;const m=new THREE.Mesh(new THREE.TorusGeometry(.45+Math.random()*.9,.04,6,32),rB.clone());m.material.opacity=.08+Math.random()*.18;m.position.set(Math.sin(a)*r*.83,h,Math.cos(a)*r*.83);m.lookAt(0,h,0);scene.add(m)}
for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2,r=39+Math.random()*4;for(let j=0;j<8;j++){const fm=new THREE.Mesh(new THREE.BoxGeometry(.04,.6,.04),new THREE.MeshBasicMaterial({color:0x003355,transparent:true,opacity:.22+Math.random()*.18}));fm.position.set(Math.sin(a)*r*.86,j*2.5+Math.random(),Math.cos(a)*r*.86);scene.add(fm)}}}

const shimData=[];
for(let i=0;i<24;i++){const a=Math.random()*Math.PI*2,r=3+Math.random()*26,rad=1.2+Math.random()*5,y=17+Math.random()*11;
const mat=new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(.55+Math.random()*.08,.6,.35),transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});
mat.opacity=.02+Math.random()*.07;
const m=new THREE.Mesh(new THREE.CircleGeometry(rad,10),mat);m.position.set(Math.sin(a)*r,y,Math.cos(a)*r);m.rotation.x=Math.PI/2;scene.add(m);
shimData.push({m,phase:Math.random()*Math.PI*2,speed:.22+Math.random()*.65,base:mat.opacity})}

const islMat=new THREE.MeshStandardMaterial({color:0x1a1e28,roughness:.88,metalness:.04,emissive:new THREE.Color(0,0,0),emissiveIntensity:0});
aM(new THREE.CylinderGeometry(5.5,6.1,5,28),islMat,0,-2.5,0,scene);
[[5.2,5.5,.48,.28],[4.0,4.4,.48,.76],[2.95,3.25,.48,1.24],[2.1,2.5,.42,1.65]].forEach(([rt,rb,h,y])=>aM(new THREE.CylinderGeometry(rt,rb,h,28),islMat,0,y,0,scene));
aM(new THREE.CylinderGeometry(1.82,2.12,.22,28),islMat,0,2.0,0,scene);
{const r=new THREE.Mesh(new THREE.TorusGeometry(2.02,.07,8,52),new THREE.MeshStandardMaterial({color:0x242a38,roughness:.72,metalness:.22}));r.rotation.x=Math.PI/2;r.position.y=1.9;scene.add(r)}
{const mM=new THREE.MeshBasicMaterial({color:0x00AACC,transparent:true,opacity:.2,blending:THREE.AdditiveBlending,depthWrite:false});
[.33,.68,1.08,1.55].forEach(r=>{const ring=new THREE.Mesh(new THREE.TorusGeometry(r,.022,6,52),mM);ring.rotation.x=Math.PI/2;ring.position.y=2.03;scene.add(ring)});
for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;const s=new THREE.Mesh(new THREE.BoxGeometry(.022,.02,1.6),mM);s.rotation.y=a;s.position.y=2.03;scene.add(s)}}

const islandColMat=new THREE.MeshBasicMaterial({color:0x002255,transparent:true,opacity:.02,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
aM(new THREE.ConeGeometry(6.2,24,28,1,true),islandColMat,0,12,0,scene);
{const sg=aM(new THREE.ConeGeometry(9,6,24,1,true),new THREE.MeshBasicMaterial({color:0x002244,transparent:true,opacity:.055,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide}),0,-2,0,scene);sg.rotation.x=Math.PI}
{const r=new THREE.Mesh(new THREE.TorusGeometry(5.55,.12,8,64),new THREE.MeshBasicMaterial({color:0x0044AA,transparent:true,opacity:.28,blending:THREE.AdditiveBlending,depthWrite:false}));r.rotation.x=Math.PI/2;r.position.y=.1;scene.add(r)}
const ERING=4;const eRings=[],eRingMats=[];
for(let i=0;i<ERING;i++){const mat=new THREE.MeshBasicMaterial({color:0x003366,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});const m=new THREE.Mesh(new THREE.RingGeometry(.98,1.0,64),mat);m.rotation.x=-Math.PI/2;m.position.y=.08;scene.add(m);eRings.push(m);eRingMats.push(mat)}

aM(new THREE.BoxGeometry(2.0,.1,2.0),new THREE.MeshStandardMaterial({color:0x1a224e,roughness:.88}),0,2.12,0,scene);
{const z=new THREE.Mesh(new THREE.TorusGeometry(.72,.27,16,40),new THREE.MeshStandardMaterial({color:0x1c2e6e,roughness:.78}));z.rotation.x=Math.PI/2;z.position.set(0,2.36,0);scene.add(z)}
aM(new THREE.CylinderGeometry(.45,.45,.08,24),new THREE.MeshStandardMaterial({color:0x1c2e6e,roughness:.78}),0,2.43,0,scene);
const sM=new THREE.MeshStandardMaterial({color:0xb07840,roughness:.72});
const figB=aM(new THREE.SphereGeometry(.32,12,10),sM,0,2.88,0,scene);figB.scale.y=1.48;
aM(new THREE.SphereGeometry(.17,10,8),sM,0,3.44,0,scene);
[-1,1].forEach(s=>{const a=aM(new THREE.SphereGeometry(.13,8,6),sM,s*.38,2.76,.1,scene);a.scale.set(1.75,.5,1.1);a.rotation.z=s*.52});
const auM1=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
const auM2=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
const auR1=new THREE.Mesh(new THREE.TorusGeometry(1.88,.054,12,80),auM1);auR1.rotation.x=Math.PI/2;auR1.position.y=2.1;scene.add(auR1);

const poolMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});

const wGlow=new THREE.PointLight(0x002244,.55,28);wGlow.position.set(0,.3,0);scene.add(wGlow);

const MUDRA_R=3.85;
const mudraGrps=[],mudraGMs=[];
const dkMat=new THREE.MeshStandardMaterial({color:0x1a1e2c,roughness:.92});

function buildMudraGeo(idx,grp){
  const col=new THREE.Color(CK[idx].hex);
  const gm=new THREE.MeshStandardMaterial({
    color:new THREE.Color(col).multiplyScalar(.35),
    emissive:col,emissiveIntensity:.08,roughness:.38,metalness:.1
  });
  mudraGMs.push(gm);
  aM(new THREE.CylinderGeometry(.24,.28,.14,8),dkMat,0,.07,0,grp);
  aM(new THREE.CylinderGeometry(.28,.24,.05,8),dkMat,0,.165,0,grp);
  const p=.2;
  switch(idx){
    case 0:{
      aM(new THREE.BoxGeometry(.32,.06,.26),dkMat,0,p,0,grp);
      const tr=new THREE.Mesh(new THREE.TorusGeometry(.115,.028,8,20),gm);
      tr.position.set(-.13,p+.32,0);tr.rotation.x=Math.PI/2;grp.add(tr);
      [0,.1,.2].forEach((x,j)=>{const f=aM(new THREE.CylinderGeometry(.022,.017,.28,5),gm,x,p+.22,0,grp);f.rotation.z=-.04*j});
      const th=aM(new THREE.CylinderGeometry(.022,.017,.18,5),gm,-.2,p+.19,0,grp);th.rotation.z=.75;
      break;
    }
    case 1:{

      [-1,1].forEach(s=>{const arc=new THREE.Mesh(new THREE.TorusGeometry(.17,.027,8,24,Math.PI*1.12),gm);arc.position.set(s*.05,p+.32,0);arc.rotation.x=Math.PI/2;arc.rotation.z=s>0?-.28:.28;grp.add(arc)});

    }
    case 2:{
      aM(new THREE.BoxGeometry(.32,.06,.26),dkMat,0,p,0,grp);
      {const c=aM(new THREE.CylinderGeometry(.018,.013,.3,5),gm,-.09,p+.33,0,grp);c.rotation.z=.74}
      {const c=aM(new THREE.CylinderGeometry(.018,.013,.3,5),gm,.09,p+.33,0,grp);c.rotation.z=-.74}
      {const c=aM(new THREE.CylinderGeometry(.018,.013,.36,5),gm,0,p+.22,0,grp);c.rotation.z=Math.PI/2}
      [[0,p+.47,0],[-.2,p+.21,0],[.2,p+.21,0]].forEach(([x,y,z])=>aM(new THREE.SphereGeometry(.038,6,5),gm,x,y,z,grp));
      break;
    }
    case 3:{
      [-1,1].forEach(s=>{
        const h=aM(new THREE.BoxGeometry(.1,.33,.22),new THREE.MeshStandardMaterial({color:new THREE.Color(col).multiplyScalar(.28),emissive:col,emissiveIntensity:.08,roughness:.5}),s*.1,p+.24,0,grp);
        h.rotation.z=s*.3;
        mudraGMs.push(h.material);
        for(let fi=0;fi<4;fi++){const fng=aM(new THREE.BoxGeometry(.018,.28,.016),gm,s*(.06+fi*.018),p+.3,-.08+fi*.04,grp);fng.rotation.z=s*.3}
      });
      aM(new THREE.SphereGeometry(.07,8,7),gm,0,p+.46,0,grp);
      break;

    case 4:{

// Petal counts per classical tantra — declared here so both
// buildPadma3D (3-D) and makePadmaSVG (2-D buttons) can use them.
const PADMA_PETALS=[4,6,10,12,16,2,24];

// ── 3-D CHAKRA PADMA / YANTRA — floats in front of viewer ───────────────────
// Each yantra is a THREE.Group of flat MeshStandardMaterial geometry
// so the chakra's point-light rakes across it with real shading.
// The group lives in world-space; each frame we billboard it to face the cam
// and place it 3.5 units in front of the camera at eye level.
const padmaGrps=[];
const PADMA_SCALE=3.2;  // crown-halo: fits over head, clear of mudra sculptures

function buildPadma3D(idx){
  const col = new THREE.Color(CK[idx].hex);
  const n   = PADMA_PETALS[idx];
  const grp = new THREE.Group();
  const PR  = PADMA_SCALE;
  const D   = PR * 0.06;

  const mat  = ()=> new THREE.MeshStandardMaterial({
    color:new THREE.Color(col).multiplyScalar(.30),
    emissive:col, emissiveIntensity:.28, roughness:.28, metalness:.18,
    envMapIntensity:.6
  });
  const wmat = ()=> new THREE.MeshStandardMaterial({
    color:new THREE.Color(col).multiplyScalar(.7),
    emissive:col, emissiveIntensity:.72, roughness:.12, metalness:.30,
    envMapIntensity:.8
  });

  const EXT = (d)=>({
    depth:d||D, bevelEnabled:true,
    bevelThickness:D*.2, bevelSize:D*.12, bevelSegments:2
  });

  // ── ROTATION STRATEGY ──────────────────────────────────────────────────────
  // All geometry is built in Three.js XY plane (Shape default).
  // ExtrudeGeometry pushes it along +Z.
  // We want everything lying FLAT (face pointing +Y) in world space.
  //
  // WRONG: mesh.rotation.x=-PI/2 then mesh.rotation.y=-a
  //   → Euler XYZ applies Ry in the *already tilted local frame* after Rx.
  //   → The Y-rotation spins around the wrong axis. Petals don't point radially.
  //
  // CORRECT: one flat wrapper group per petal ring.
  //   wrapper.rotation.x = -PI/2   → lays the XY plane flat into world XZ
  //   child.rotation.z   = a       → in wrapper's local XY, Z-rot = world Y-rot
  //   child.position     = (cos(a)*r, sin(a)*r, 0)  → in wrapper local XY = world XZ
  //
  // For non-petal pieces (rings, disc, bars) that don't need radial rotation:
  //   just mesh.rotation.x = -PI/2 is fine — they're radially symmetric.

  const flatShape = (shapeObj, depth, m)=>{
    const mesh=new THREE.Mesh(new THREE.ExtrudeGeometry(shapeObj, EXT(depth)), m());
    mesh.rotation.x=-Math.PI/2;
    return mesh;
  };

  const flatRing = (R, r, m)=>{
    const s=new THREE.Shape(); s.absarc(0,0,R,0,Math.PI*2,false);
    const h=new THREE.Path();  h.absarc(0,0,r,0,Math.PI*2,true); s.holes.push(h);
    return flatShape(s, D, m);
  };

  const flatDisc = (r, m)=>{
    const s=new THREE.Shape(); s.absarc(0,0,r,0,Math.PI*2,false);
    return flatShape(s, D*.45, m);
  };

  // Almond: 1.6:1 ratio, long axis along X in XY plane.
  // Two quadratic bezier curves — no arc angle math, no crossing arcs.
  const almondShape = (pLen)=>{
    const hl=pLen/2, hw=pLen/3.2;
    const s=new THREE.Shape();
    s.moveTo(-hl, 0);
    s.quadraticCurveTo( 0,  hw,  hl, 0);
    s.quadraticCurveTo( 0, -hw, -hl, 0);
    s.closePath();
    return s;
  };

  const flatBar = (len, thick, m)=>{
    const hl=len/2, ht=thick/2;
    const s=new THREE.Shape();
    s.moveTo(-hl,-ht); s.lineTo(hl,-ht); s.lineTo(hl,ht); s.lineTo(-hl,ht); s.closePath();
    return flatShape(s, D*.6, m);
  };

  const flatTri = (r, rot)=>{
    const g=new THREE.Group();
    for(let k=0;k<3;k++){
      const a0=(k/3)*Math.PI*2+rot, a1=((k+1)/3)*Math.PI*2+rot;
      const x0=Math.cos(a0)*r, y0=Math.sin(a0)*r;
      const x1=Math.cos(a1)*r, y1=Math.sin(a1)*r;
      const len=Math.sqrt((x1-x0)**2+(y1-y0)**2);
      const b=flatBar(len, PR*.038, wmat);
      // flatBar already has rotation.x=-PI/2 applied.
      // To position and orient it we use a wrapper:
      const wb=new THREE.Group();
      wb.rotation.x=-Math.PI/2;
      b.rotation.x=0;  // undo the flatBar rotation since wrapper handles it
      b.rotation.z=-Math.atan2(y1-y0, x1-x0);
      b.position.set((x0+x1)/2, (y0+y1)/2, 0);
      wb.add(b); g.add(wb);
    }
    return g;
  };

  // Petal ring: n almond petals laid flat, each pointing radially outward.
  // Uses wrapper group pattern to avoid Euler order issues.
  const petalRing = (count, pLen, radius, aOff)=>{
    // One wrapper for the whole ring — rotation.x=-PI/2 lays everything flat.
    const ring=new THREE.Group();
    ring.rotation.x=-Math.PI/2;
    for(let i=0;i<count;i++){
      const a=(i/count)*Math.PI*2+(aOff||0);
      const mesh=new THREE.Mesh(
        new THREE.ExtrudeGeometry(almondShape(pLen), EXT(D)),
        mat()
      );
      // In ring's local XY: rotate around Z to point radially, position in XY.
      mesh.rotation.z = a;              // Z-rot in wrapper = Y-rot in world ✓
      mesh.position.set(Math.cos(a)*radius, Math.sin(a)*radius, 0);
      ring.add(mesh);
    }
    grp.add(ring);
  };

  // ── BUILD ──────────────────────────────────────────────────────────────────
  if(idx===5){
    // AJNA: vesica/mandorla eye shape.
    // Two crescents sharing the SAME centre, tips meeting at left and right.
    // Top crescent bulges upward (+Z world), bottom bulges downward (-Z world).
    // Neither is offset from centre — they are concentric, mirrored top/bottom.
    // Together they form the eye outline of the Ajna symbol.
    //
    // Construction in wrapper XY (wrapper.rotation.x=-PI/2 → XY=world XZ):
    //   Both shapes centred at (0,0). Long axis along X.
    //   Top crescent: bezier control points go to +Y (= world +Z, bulges "up")
    //   Bottom crescent: bezier control points go to -Y (= world -Z, bulges "down")
    //   Both at position (0,0,0) — they overlap to form the eye.
    const ajnaW=new THREE.Group();
    ajnaW.rotation.x=-Math.PI/2;
    const aL=PR*1.65;  // eye width (tip to tip)
    const aH=PR*0.72;  // eye height (top of upper crescent to bottom of lower)
    const hl=aL/2, hw=aH/2;
    // Top crescent: from (-hl,0) curves up to (hl,0)
    const topShape=new THREE.Shape();
    topShape.moveTo(-hl, 0);
    topShape.bezierCurveTo(-hl*.2, hw, hl*.2, hw, hl, 0);
    topShape.lineTo(-hl, 0);
    topShape.closePath();
    // Bottom crescent: from (-hl,0) curves down to (hl,0)
    const botShape=new THREE.Shape();
    botShape.moveTo(-hl, 0);
    botShape.bezierCurveTo(-hl*.2,-hw, hl*.2,-hw, hl, 0);
    botShape.lineTo(-hl, 0);
    botShape.closePath();
    [topShape,botShape].forEach(shape=>{
      const mesh=new THREE.Mesh(
        new THREE.ExtrudeGeometry(shape, EXT(D)), mat());
      // No position offset — both at origin, forming the eye together
      ajnaW.add(mesh);
    });
    grp.add(ajnaW);
    grp.add(flatRing(PR*.26, PR*.18, wmat));
    grp.add(flatTri(PR*.30, Math.PI));
    grp.add(flatDisc(PR*.065, wmat));
  } else {
    const pLen = PR * 0.52;
    const pOff = PR * 0.48;
    petalRing(n, pLen, pOff, 0);

    grp.add(flatRing(PR*.20, PR*.14, wmat));
    grp.add(flatRing(PR*.84, PR*.79, mat));
    grp.add(flatDisc(PR*.058, wmat));

    if(idx===0){
      // Earth square: 4 bars forming a square, using wrapper pattern
      const sqW=new THREE.Group(); sqW.rotation.x=-Math.PI/2;
      const s=PR*.57;
      const C=[[s,s],[s,-s],[-s,-s],[-s,s]];
      C.forEach((_,k)=>{
        const [x0,y0]=C[k],[x1,y1]=C[(k+1)%4];
        const len=Math.sqrt((x1-x0)**2+(y1-y0)**2);
        const hl=len/2, ht=PR*.019;
        const bs=new THREE.Shape();
        bs.moveTo(-hl,-ht); bs.lineTo(hl,-ht); bs.lineTo(hl,ht); bs.lineTo(-hl,ht); bs.closePath();
        const bm=new THREE.Mesh(new THREE.ExtrudeGeometry(bs,EXT(D*.6)), wmat());
        bm.rotation.z=-Math.atan2(y1-y0,x1-x0);
        bm.position.set((x0+x1)/2,(y0+y1)/2,0);
        sqW.add(bm);
      });
      grp.add(sqW);
    }
    if(idx===2){ grp.add(flatTri(PR*.44, Math.PI/2)); }
    if(idx===3){ grp.add(flatTri(PR*.42,0)); grp.add(flatTri(PR*.42,Math.PI)); }
    if(idx===4){ grp.add(flatRing(PR*.40, PR*.34, wmat)); }
    if(idx===6){
      // Sahasrara: DOMED thousand-petaled lotus (Image 2).
      // Inner rings sit HIGHER than outer rings — like a crown/dome shape.
      // Each ring is a petalRing but wrapped in a group elevated on Y.
      // Ring spec: [count, petalLen, radius, angularOffset, yElevation]
      const rings=[
        [ 8, PR*.30, PR*.14, 0,           PR*.32],
        [12, PR*.28, PR*.28, Math.PI/12,  PR*.24],
        [16, PR*.26, PR*.42, Math.PI/16,  PR*.16],
        [20, PR*.24, PR*.56, Math.PI/20,  PR*.09],
        [24, PR*.22, PR*.70, Math.PI/24,  PR*.03],
        [28, PR*.20, PR*.83, Math.PI/28,  0     ],
      ];
      rings.forEach(([c,pL,rad,rot,yEl])=>{
        const levelGrp=new THREE.Group();
        levelGrp.position.y=yEl;
        // petalRing adds directly to grp — we need it to add to levelGrp instead
        // so rebuild inline:
        const ring=new THREE.Group();
        ring.rotation.x=-Math.PI/2;
        for(let i=0;i<c;i++){
          const a=(i/c)*Math.PI*2+rot;
          const mesh=new THREE.Mesh(
            new THREE.ExtrudeGeometry(almondShape(pL),EXT(D)), mat());
          mesh.rotation.z=a;
          mesh.position.set(Math.cos(a)*rad, Math.sin(a)*rad, 0);
          ring.add(mesh);
        }
        levelGrp.add(ring);
        grp.add(levelGrp);
      });
      grp.add(flatDisc(PR*.08, wmat));
    }
  }

  grp.visible=false; scene.add(grp); return grp;
}

// ── PADMA / YANTRA SVG BUTTON ICONS ─────────────────────────────────────────
// Petal counts follow classical tantric tradition:
// Muladhara=4, Svadhisthana=6, Manipura=10, Anahata=12,
// Vishuddha=16, Ajna=2 (wings/petals + bindu), Sahasrara=display as 24 dense
function makePadmaSVG(idx){
  const ck=CK[idx];
  const n=PADMA_PETALS[idx];
  const cx=50,cy=50,R=22,r=10,ir=7;
  const c=ck.css;
  let paths='';

  if(idx===5){
    // Ajna — two large wing-petals + centre circle + downward triangle (bindu)
    // Left wing
    paths+=`<path d="M50,50 C30,28 14,36 18,50 C14,64 30,72 50,50Z"
      fill="none" stroke="${c}" stroke-width="1.4" opacity=".9"/>`;
    // Right wing
    paths+=`<path d="M50,50 C70,28 86,36 82,50 C86,64 70,72 50,50Z"
      fill="none" stroke="${c}" stroke-width="1.4" opacity=".9"/>`;
    // Centre circle
    paths+=`<circle cx="50" cy="50" r="9" fill="none" stroke="${c}" stroke-width="1.2"/>`;
    // Bindu dot
    paths+=`<circle cx="50" cy="50" r="2.5" fill="${c}" opacity=".95"/>`;
    // Downward triangle (trikona)
    paths+=`<polygon points="50,42 58,56 42,56" fill="none" stroke="${c}" stroke-width="1"/>`;
  } else {
    // Standard lotus: N petals as elliptical lobes arranged radially
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2 - Math.PI/2;
      // Each petal: an ellipse centred between inner ring and outer ring
      const pc=R*.62; // petal centre distance from origin
      const px=cx+Math.cos(a)*pc, py=cy+Math.sin(a)*pc;
      const pw=R*.38, ph=R*.58; // petal width / height in local coords
      // Rotate the ellipse to point outward
      const deg=(a*180/Math.PI)+90;
      paths+=`<ellipse cx="${px.toFixed(1)}" cy="${py.toFixed(1)}"
        rx="${pw.toFixed(1)}" ry="${ph.toFixed(1)}"
        transform="rotate(${deg.toFixed(1)},${px.toFixed(1)},${py.toFixed(1)})"
        fill="none" stroke="${c}" stroke-width="1.15" opacity=".88"/>`;
    }
    // Inner circle (pericarp)
    paths+=`<circle cx="${cx}" cy="${cy}" r="${ir}" fill="none" stroke="${c}" stroke-width="1.1"/>`;
    // Bindu (seed point)
    paths+=`<circle cx="${cx}" cy="${cy}" r="2.2" fill="${c}" opacity=".9"/>`;
    // For Solar Plexus (10 petals) add inner downward triangle
    if(idx===2){
      paths+=`<polygon points="50,41 58,55 42,55" fill="none" stroke="${c}" stroke-width=".9" opacity=".7"/>`;
    }
    // For Heart (12 petals) add Star of David (two triangles = air/vayu yantra)
    if(idx===3){
      paths+=`<polygon points="50,40 58,55 42,55" fill="none" stroke="${c}" stroke-width=".9" opacity=".7"/>`;
      paths+=`<polygon points="50,60 58,45 42,45" fill="none" stroke="${c}" stroke-width=".9" opacity=".7"/>`;
    }
    // For Throat (16) add inner circle + downward triangle
    if(idx===4){
      paths+=`<circle cx="50" cy="50" r="13" fill="none" stroke="${c}" stroke-width=".8" opacity=".55"/>`;
      paths+=`<polygon points="50,43 57,54 43,54" fill="none" stroke="${c}" stroke-width=".85" opacity=".65"/>`;
    }
    // For Crown — add concentric ring to suggest thousand petals
    if(idx===6){
      paths+=`<circle cx="50" cy="50" r="14" fill="none" stroke="${c}" stroke-width=".7" opacity=".4"/>`;
      paths+=`<circle cx="50" cy="50" r="20" fill="none" stroke="${c}" stroke-width=".55" opacity=".28"/>`;
    }
  }
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"
    style="filter:drop-shadow(0 0 4px ${c}88)">${paths}</svg>`;
}

      // Slow gentle spin. Scale up slightly so it reads large.
      pg.position.set(0, 4.1, 2.5);
      pg.rotation.set(-(Math.PI/2 - 0.38), t*0.055, 0);
      padmaLight.position.set(0, 5.5, -3.5);
      pg.scale.setScalar(0.82 + 0.035*Math.abs(pulse));
    } else {
      // ORBIT / TOP: flat halo above crown, 30° tilt toward viewer.
      pg.position.set(0, 4.2, 0);
      pg.rotation.set(Math.PI/6, t*0.10, 0);
      padmaLight.position.set(0, 7.5, -0.5);
      pg.scale.setScalar(0.65 + 0.04*Math.abs(pulse));
    }
    padmaLight.intensity = 3.5*(1 + 0.28*pulse);
  }

  // ── CAMERA overrides ─────────────────────────────────────────────────────
  if(viewMode===2){
    // MUDRA cam: pulled back to -14 on Z, padma is at z=2.5 so total separation=16.5.
    // Slightly elevated. Gentle left-right drift from cTh orbit.
    const driftX = Math.sin(cTh)*1.2;
    cam.position.set(driftX, 4.8, -14);
    cam.lookAt(new THREE.Vector3(0, 4.1, 2.5));
  } else if(viewMode===3){
    // ── VR STEREO MODE ────────────────────────────────────────────────────
    // Side-by-side split with barrel distortion overlay.
    // Both eye cameras sit at head height, separated by IPD (0.063 m ≈ 0.32 units).
    const IPD=0.32;
    const driftX_vr = Math.sin(cTh)*1.2;
    const eyePos  = new THREE.Vector3(driftX_vr, 4.8, -14);
    const lookTgt = new THREE.Vector3(0, 4.1, 2.5); // padma face centre
    // We render into two halves of the canvas using scissor/viewport.
    // Left eye
    renderer.setScissorTest(true);
    const W=innerWidth,H=innerHeight;
    // LEFT EYE
    renderer.setViewport(0,0,W/2,H);
    renderer.setScissor(0,0,W/2,H);
    cam.position.set(eyePos.x-IPD/2,eyePos.y,eyePos.z);
    cam.lookAt(lookTgt);
    renderer.render(scene,cam);
    // RIGHT EYE
    renderer.setViewport(W/2,0,W/2,H);
    renderer.setScissor(W/2,0,W/2,H);
    cam.position.set(eyePos.x+IPD/2,eyePos.y,eyePos.z);
    cam.lookAt(lookTgt);
    renderer.render(scene,cam);
    renderer.setScissorTest(false);
    renderer.setViewport(0,0,W,H);
    renderer.setScissor(0,0,W,W);
  }
  // Store head x for VR (avoids referencing before declare)
  const hx_vr = Math.sin(cTh)*0.01;

  // Ortho camera tracks aspect on resize (handled in resize listener)
  if(viewMode!==3) renderer.render(scene,activeCam);
})();

window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  const s=orthoSize;
  camOrtho.left=-s*cam.aspect;camOrtho.right=s*cam.aspect;
  camOrtho.top=s;camOrtho.bottom=-s;camOrtho.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
setTimeout(()=>{const l=document.getElementById('load');l.classList.add('out');setTimeout(()=>l.remove(),1300)},1200);
</script>
</body>
