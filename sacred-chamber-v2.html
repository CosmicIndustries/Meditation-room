<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sacred Chamber — Zora's Domain</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cinzel+Decorative&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000414;font-family:'Cinzel',Georgia,serif}
#hud{position:fixed;top:0;left:0;right:0;padding:18px 16px 0;text-align:center;pointer-events:none;z-index:10}
#hTitle{font-family:'Cinzel Decorative',serif;font-size:clamp(11px,1.9vw,22px);letter-spacing:5px;color:#fff;text-transform:uppercase;text-shadow:0 0 60px currentColor,0 0 20px currentColor;transition:color .9s}
#hSub{font-size:clamp(8px,1.1vw,11px);color:rgba(200,220,255,.42);margin-top:7px;letter-spacing:2.5px;transition:color .8s}
#hHint{font-size:8px;color:rgba(255,255,255,.14);margin-top:8px;letter-spacing:1.5px}
#btns{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:9px;z-index:10;align-items:center}
.cbtn{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.14);cursor:pointer;transition:all .35s;position:relative;flex-shrink:0}
.cbtn:hover{transform:scale(1.15);border-color:rgba(255,255,255,.55)}
.cbtn.on{border-color:#fff}
.cbtn.on::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1.5px solid currentColor;animation:rp 2s ease-out infinite}
@keyframes rp{0%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(1.78)}}
#snd{position:fixed;top:15px;right:15px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);color:rgba(200,220,255,.4);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;user-select:none}
#snd:hover,#snd.on{border-color:rgba(100,180,255,.5);color:rgba(150,210,255,.9)}
#tip{position:fixed;pointer-events:none;background:rgba(0,4,20,.88);padding:4px 12px;border-radius:2px;font-size:9px;letter-spacing:2.2px;border:1px solid rgba(100,160,255,.2);display:none;z-index:20;white-space:nowrap;text-transform:uppercase}
#load{position:fixed;inset:0;background:#000414;z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;font-family:'Cinzel Decorative',serif;color:rgba(80,160,220,.45);font-size:11px;letter-spacing:4px;text-transform:uppercase;transition:opacity 1.2s}
#load .glyph{font-size:28px;animation:gp 2.4s ease-in-out infinite}
@keyframes gp{0%,100%{opacity:.3;transform:scale(.9)}50%{opacity:.8;transform:scale(1.1)}}
#load.out{opacity:0;pointer-events:none}
</style>
</head>
<body>
<div id="load"><div class="glyph">⬡</div><div>Summoning the Sacred Waters</div></div>
<div id="hud">
  <div id="hTitle">Sacred Chamber</div>
  <div id="hSub">Select a crystal pillar to begin</div>
  <div id="hHint">Click Pillar · Drag to Orbit · Scroll to Zoom</div>
</div>
<div id="btns"></div>
<div id="snd" title="Binaural tones — use headphones">♪</div>
<div id="tip"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ── CHAKRA DATA ─────────────────────────────────────────────────
const CK = [
  {name:'Root',       sk:'Muladhara',   hex:0xFF1111,css:'#FF1111',freq:396,mantra:'LAM',el:'Earth'},
  {name:'Sacral',     sk:'Svadhisthana',hex:0xFF7700,css:'#FF7700',freq:417,mantra:'VAM',el:'Water'},
  {name:'Solar Plexus',sk:'Manipura',  hex:0xFFEE00,css:'#FFEE00',freq:528,mantra:'RAM',el:'Fire'},
  {name:'Heart',      sk:'Anahata',     hex:0x00CC44,css:'#00CC44',freq:639,mantra:'YAM',el:'Air'},
  {name:'Throat',     sk:'Vishuddha',   hex:0x0088FF,css:'#0088FF',freq:741,mantra:'HAM',el:'Sound'},
  {name:'Third Eye',  sk:'Ajna',        hex:0x3311EE,css:'#5522FF',freq:852,mantra:'AUM',el:'Light'},
  {name:'Crown',      sk:'Sahasrara',   hex:0xAA00FF,css:'#BB22FF',freq:963,mantra:'OM', el:'Consciousness'},
];
const N = 7, OR = 16;

// ── RENDERER + SCENE + CAMERA ────────────────────────────────────
const renderer = new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000414);
scene.fog = new THREE.FogExp2(0x000414, 0.012);

const cam = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 260);
const CT = new THREE.Vector3(0, 4, 0);
let cTh = Math.PI, cPh = 0.38, cR = 26;
const reC = () => {
  cam.position.set(CT.x+cR*Math.sin(cPh)*Math.sin(cTh), CT.y+cR*Math.cos(cPh), CT.z+cR*Math.sin(cPh)*Math.cos(cTh));
  cam.lookAt(CT);
};
reC();

// ── ORBIT ───────────────────────────────────────────────────────
let drag=false, mD=[0,0], mP=[0,0];
const el = renderer.domElement;
el.addEventListener('mousedown',e=>{drag=true;mP=mD=[e.clientX,e.clientY]});
el.addEventListener('mousemove',e=>{if(!drag)return;cTh-=(e.clientX-mP[0])*.004;cPh=Math.max(.06,Math.min(Math.PI*.46,cPh+(e.clientY-mP[1])*.004));mP=[e.clientX,e.clientY];reC()});
el.addEventListener('mouseup',()=>drag=false);
el.addEventListener('wheel',e=>{cR=Math.max(4,Math.min(52,cR+e.deltaY*.055));reC()},{passive:true});
let tp=null;
el.addEventListener('touchstart',e=>{tp=e.touches[0];mD=[tp.clientX,tp.clientY];drag=true},{passive:true});
el.addEventListener('touchmove',e=>{const t=e.touches[0];cTh-=(t.clientX-tp.clientX)*.004;cPh=Math.max(.06,Math.min(Math.PI*.46,cPh+(t.clientY-tp.clientY)*.004));tp=t;reC()},{passive:true});
el.addEventListener('touchend',()=>drag=false);

// ── AUDIO ───────────────────────────────────────────────────────
let actx=null, aN=[], sndOn=false;
const iA=()=>{if(!actx)actx=new(AudioContext||webkitAudioContext)()};
const stopA=()=>{const t=actx?actx.currentTime:0;aN.forEach(({o,g})=>{try{g.gain.linearRampToValueAtTime(0,t+1)}catch(e){}setTimeout(()=>{try{o.stop()}catch(e){}},1100)});aN=[]};
const playA=fr=>{if(!actx||!sndOn)return;stopA();const t=actx.currentTime;[[fr*.5,.038,'sawtooth'],[fr,.055,'sine'],[fr*2,.022,'sine'],[fr+7,.03,'sine']].forEach(([f,a,tp])=>{const o=actx.createOscillator(),g=actx.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(a,t+2);o.connect(g);g.connect(actx.destination);o.start();aN.push({o,g})})};
document.getElementById('snd').addEventListener('click',()=>{iA();sndOn=!sndOn;const b=document.getElementById('snd');b.textContent=sndOn?'♪':'♩';b.classList.toggle('on',sndOn);if(!sndOn)stopA();else if(aIdx>=0)playA(CK[aIdx].freq);if(actx&&actx.state==='suspended')actx.resume()});

// ── HELPER ──────────────────────────────────────────────────────
const aM=(geo,mat,x,y,z,par)=>{const m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);par.add(m);return m};

// ── GLOBAL LIGHTS ───────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x06182a, 0.65));
const hemi = new THREE.HemisphereLight(0x0a2040, 0x04080e, 0.4);
scene.add(hemi);

// ── CAVE DOME ───────────────────────────────────────────────────
aM(new THREE.SphereGeometry(54,32,22,0,Math.PI*2,0,Math.PI*.65),
  new THREE.MeshStandardMaterial({color:0x090c12,roughness:1,side:THREE.BackSide}),0,3,0,scene);

// ── CAVE STONE FLOOR (below water) ──────────────────────────────
{const m=new THREE.Mesh(new THREE.CircleGeometry(52,72),new THREE.MeshStandardMaterial({color:0x0b0d11,roughness:.98}));m.rotation.x=-Math.PI/2;m.position.y=-5;scene.add(m)}

// ── DEEP WATER — CAUSTIC SHADER ─────────────────────────────────
const dWUni = {uTime:{value:0}, uColor:{value:new THREE.Color(0x001428)}};
{const m=new THREE.Mesh(new THREE.PlaneGeometry(92,92,1,1),new THREE.ShaderMaterial({
  uniforms:dWUni,
  vertexShader:`varying vec2 vU;void main(){vU=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`uniform float uTime;uniform vec3 uColor;varying vec2 vU;
    float cs(vec2 p){return sin(p.x*6.+uTime)*cos(p.y*5.5-uTime*.88)+sin(p.x*3.5-uTime*.78)*cos(p.y*7.+uTime*.62)+sin(p.x*9.2+uTime*1.1)*cos(p.y*3.8-uTime*.72)*.6;}
    void main(){float v=cs(vU*6.2);v=pow(clamp(v*.33+.5,0.,1.),2.6);gl_FragColor=vec4(uColor+vec3(.01,.03,.045)*v,v*.65+.18);}`,
  transparent:true,depthWrite:false}));m.rotation.x=-Math.PI/2;m.position.y=-2.5;scene.add(m)}

// ── WATER SURFACE ───────────────────────────────────────────────
const wUni = {uTime:{value:0}, uColor:{value:new THREE.Color(0x002e4a)}};
const wSurf = new THREE.Mesh(new THREE.PlaneGeometry(90,90,88,88), new THREE.ShaderMaterial({
  uniforms:wUni,
  vertexShader:`uniform float uTime;varying vec2 vXY;varying float vH;
    void main(){vXY=position.xy;float r=length(position.xy);
      float h=sin(r*1.55-uTime*1.5)*.16+sin(r*3.1-uTime*.92)*.07+sin(r*.72+uTime*.38)*.05
             +sin(position.x*1.85+uTime*.88)*.04+sin(position.y*2.05-uTime*1.08)*.035;
      vH=h;gl_Position=projectionMatrix*modelViewMatrix*vec4(position.xy,h,1.);}`,
  fragmentShader:`uniform vec3 uColor;varying vec2 vXY;varying float vH;
    void main(){float r=length(vXY);float s=clamp((vH+.22)*2.9,0.,1.);
      vec3 c=mix(uColor*.38,uColor*1.55+vec3(.04,.09,.12),s);c+=pow(s,5.5)*.28*vec3(.2,.55,.9);
      float a=.88*(1.-smoothstep(40.,45.,r));gl_FragColor=vec4(c,a);}`,
  transparent:true,side:THREE.DoubleSide,depthWrite:false}));
wSurf.rotation.x=-Math.PI/2;wSurf.position.y=.06;scene.add(wSurf);

// ── BIOLUMINESCENT CAVE WALL DETAILS ────────────────────────────
{
  const cB=new THREE.MeshBasicMaterial({color:0x00AACC,transparent:true,opacity:.28});
  const rB=new THREE.MeshBasicMaterial({color:0x007799,transparent:true,opacity:.18});
  for(let i=0;i<60;i++){const a=Math.random()*Math.PI*2,h=1+Math.random()*20,r=37+Math.random()*7;const m=new THREE.Mesh(new THREE.OctahedronGeometry(.07+Math.random()*.25),cB.clone());m.material.opacity=.12+Math.random()*.28;m.position.set(Math.sin(a)*r*.87,h,Math.cos(a)*r*.87);scene.add(m)}
  for(let i=0;i<14;i++){const a=Math.random()*Math.PI*2,h=5+Math.random()*14,r=35+Math.random()*6;const m=new THREE.Mesh(new THREE.TorusGeometry(.5+Math.random()*.9,.038,6,32),rB.clone());m.material.opacity=.1+Math.random()*.18;m.position.set(Math.sin(a)*r*.84,h,Math.cos(a)*r*.84);m.lookAt(0,h,0);scene.add(m)}
}

// ── CENTRAL STEPPED ISLAND ──────────────────────────────────────
const islMat = new THREE.MeshStandardMaterial({color:0x1a1e28,roughness:.88,metalness:.04,emissive:new THREE.Color(0,0,0),emissiveIntensity:0});
// Submerged base (visible through water for depth effect)
aM(new THREE.CylinderGeometry(5.5,6.1,5,28),islMat,0,-2.5,0,scene);
// Stepping rings
[[5.2,5.5,.48,.28],[4.0,4.4,.48,.76],[2.95,3.25,.48,1.24],[2.1,2.5,.42,1.65]].forEach(([rt,rb,h,y])=>aM(new THREE.CylinderGeometry(rt,rb,h,28),islMat,0,y,0,scene));
// Platform dais
aM(new THREE.CylinderGeometry(1.82,2.12,.22,28),islMat,0,2.0,0,scene);
// Carved rim detail
{const rim=new THREE.Mesh(new THREE.TorusGeometry(2.02,.07,8,52),new THREE.MeshStandardMaterial({color:0x242a38,roughness:.72,metalness:.22}));rim.rotation.x=Math.PI/2;rim.position.y=1.9;scene.add(rim)}

// Medallion pattern on island surface
{const mM=new THREE.MeshBasicMaterial({color:0x00AACC,transparent:true,opacity:.2,blending:THREE.AdditiveBlending,depthWrite:false});
[.33,.68,1.08,1.55].forEach(r=>{const ring=new THREE.Mesh(new THREE.TorusGeometry(r,.022,6,52),mM);ring.rotation.x=Math.PI/2;ring.position.y=2.03;scene.add(ring)});
for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;const sp=new THREE.Mesh(new THREE.BoxGeometry(.022,.02,1.6),mM);sp.rotation.y=a;sp.position.y=2.03;scene.add(sp)}}

// ── ZABUTON / ZAFU / FIGURE ─────────────────────────────────────
aM(new THREE.BoxGeometry(2.0,.1,2.0),new THREE.MeshStandardMaterial({color:0x1a224e,roughness:.88}),0,2.12,0,scene);
const zafu=new THREE.Mesh(new THREE.TorusGeometry(.72,.27,16,40),new THREE.MeshStandardMaterial({color:0x1c2e6e,roughness:.78}));zafu.rotation.x=Math.PI/2;zafu.position.set(0,2.36,0);scene.add(zafu);
aM(new THREE.CylinderGeometry(.45,.45,.08,24),new THREE.MeshStandardMaterial({color:0x1c2e6e,roughness:.78}),0,2.43,0,scene);
const skinM=new THREE.MeshStandardMaterial({color:0xb07840,roughness:.72});
const figB=aM(new THREE.SphereGeometry(.32,12,10),skinM,0,2.88,0,scene);figB.scale.y=1.48;
aM(new THREE.SphereGeometry(.17,10,8),skinM,0,3.44,0,scene);
[-1,1].forEach(s=>{const a=aM(new THREE.SphereGeometry(.13,8,6),skinM,s*.38,2.76,.1,scene);a.scale.set(1.75,.5,1.1);a.rotation.z=s*.52});

// Aura rings
const auM1=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
const auM2=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
const auR1=new THREE.Mesh(new THREE.TorusGeometry(1.88,.054,12,80),auM1);auR1.rotation.x=Math.PI/2;auR1.position.y=2.1;scene.add(auR1);
const auR2=new THREE.Mesh(new THREE.TorusGeometry(2.78,.034,8,80),auM2);auR2.rotation.x=Math.PI/2;auR2.position.y=2.04;scene.add(auR2);

// Light pool disc on island
const poolMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
const poolDisc=new THREE.Mesh(new THREE.CircleGeometry(1.75,32),poolMat);poolDisc.rotation.x=-Math.PI/2;poolDisc.position.y=2.03;scene.add(poolDisc);

const cLight=new THREE.PointLight(0xffffff,0,24);cLight.position.set(0,3.5,0);scene.add(cLight);
const wGlow=new THREE.PointLight(0x002244,.55,26);wGlow.position.set(0,.3,0);scene.add(wGlow);

// ── ELEMENT PILLAR BUILDERS ──────────────────────────────────────
// Each populates grp from y=0 (at water) to capital top ~y=13.1-13.3

function buildEarth(g) {
  const m=new THREE.MeshStandardMaterial({color:0x2a1e14,roughness:.97,metalness:.01});
  aM(new THREE.BoxGeometry(4.4,.66,4.4),m,0,.33,0,g);
  aM(new THREE.BoxGeometry(3.75,.32,3.75),m,0,.83,0,g);
  [[3.22,3.0,1.63],[2.85,2.78,4.62],[2.52,2.5,7.4],[2.12,2.4,10.05]].forEach(([w,h,y])=>aM(new THREE.BoxGeometry(w,h,w),m,0,y,0,g));
  aM(new THREE.BoxGeometry(3.0,.46,3.0),m,0,11.65,0,g);
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;const mn=new THREE.Mesh(new THREE.BoxGeometry(.46,.88,.46),m);mn.position.set(Math.sin(a)*1.1,12.38,Math.cos(a)*1.1);g.add(mn)}
  aM(new THREE.BoxGeometry(3.55,.42,3.55),m,0,13.05,0,g);
}

function buildWater(g) {
  const m=new THREE.MeshStandardMaterial({color:0x141e2c,roughness:.76,metalness:.14});
  const rm=new THREE.MeshStandardMaterial({color:0x1a3040,roughness:.68,metalness:.22});
  aM(new THREE.CylinderGeometry(2.6,3.05,.66,24),m,0,.33,0,g);
  const pts=[];
  for(let i=0;i<=34;i++){const t=i/34;pts.push(new THREE.Vector2(Math.max(.36,.94+.62*Math.sin(t*Math.PI*2.75)*Math.pow(1-t*.5,.55)),.66+t*11.65))}
  g.add(new THREE.Mesh(new THREE.LatheGeometry(pts,28),m));
  [3.1,6.7,10.3].forEach(y=>{const r=new THREE.Mesh(new THREE.TorusGeometry(1.08,.1,8,32),rm);r.rotation.x=Math.PI/2;r.position.set(0,y,0);g.add(r)});
  aM(new THREE.CylinderGeometry(1.92,1.52,.46,24),m,0,12.98,0,g);
  aM(new THREE.CylinderGeometry(2.28,1.92,.28,24),m,0,12.65,0,g);
}

function buildFire(g) {
  const m=new THREE.MeshStandardMaterial({color:0x221009,roughness:.82,metalness:.04});
  aM(new THREE.CylinderGeometry(2.52,3.05,.66,12),m,0,.33,0,g);
  const pts=[];
  for(let i=0;i<=28;i++){const t=i/28;pts.push(new THREE.Vector2(1.88*Math.pow(1-t*.86,.52)+.36,.66+t*11.0))}
  g.add(new THREE.Mesh(new THREE.LatheGeometry(pts,14),m));
  // Capital plates
  aM(new THREE.BoxGeometry(3.1,.4,3.1),m,0,12.28,0,g);
  aM(new THREE.BoxGeometry(2.45,.28,2.45),m,0,12.72,0,g);
  // Three flame spires — crystal embeds in tallest
  aM(new THREE.ConeGeometry(.43,3.4,5),m,0,14.12,0,g);
  [Math.PI*2/3,Math.PI*4/3].forEach(a=>aM(new THREE.ConeGeometry(.29,2.3,5),m,Math.sin(a)*.72,13.45,Math.cos(a)*.72,g));
}

function buildAir(g) {
  const m=new THREE.MeshStandardMaterial({color:0x141c16,roughness:.85});
  const cm=new THREE.MeshStandardMaterial({color:0x1c2820,roughness:.78,metalness:.14});
  aM(new THREE.CylinderGeometry(2.42,2.82,.62,24),m,0,.31,0,g);
  // Four open columns — cave visible through gaps
  [[.9,.9],[.9,-.9],[-.9,.9],[-.9,-.9]].forEach(([ox,oz])=>aM(new THREE.CylinderGeometry(.21,.27,12,10),m,ox,6.62,oz,g));
  // Horizontal connecting rings at 3 levels
  [2.8,6.5,10.2].forEach(y=>{
    const r=new THREE.Mesh(new THREE.TorusGeometry(1.26,.09,8,32),cm);r.rotation.x=Math.PI/2;r.position.set(0,y,0);g.add(r);
    [[.9,.9],[.9,-.9],[-.9,.9],[-.9,-.9]].forEach(([ox,oz])=>aM(new THREE.SphereGeometry(.1,6,5),cm,ox,y,oz,g));
  });
  // Top cap
  {const r=new THREE.Mesh(new THREE.TorusGeometry(1.26,.09,8,32),cm);r.rotation.x=Math.PI/2;r.position.set(0,12.62,0);g.add(r)}
  aM(new THREE.CylinderGeometry(2.42,2.18,.2,24),m,0,13.05,0,g);
  {const r=new THREE.Mesh(new THREE.TorusGeometry(1.76,.11,8,32),cm);r.rotation.x=Math.PI/2;r.position.set(0,13.22,0);g.add(r)}
}

function buildSound(g) {
  const m=new THREE.MeshStandardMaterial({color:0x0e1624,roughness:.72,metalness:.18});
  const rm=new THREE.MeshStandardMaterial({color:0x192840,roughness:.6,metalness:.36});
  aM(new THREE.CylinderGeometry(2.62,3.05,.66,24),m,0,.33,0,g);
  // Bell/vase profile — wide base, throat narrows, widens to capital
  const bp=[[2.18,.66],[2.0,1.18],[1.58,2.2],[1.15,3.65],[.84,5.65],[.74,6.65],[.9,8.12],[1.12,9.62],[1.36,10.92],[1.62,12.08],[1.95,12.82]].map(([r,y])=>new THREE.Vector2(r,y));
  g.add(new THREE.Mesh(new THREE.LatheGeometry(bp,30),m));
  // Resonant tuning rings
  [3.8,7.2,10.5].forEach(y=>{const r=new THREE.Mesh(new THREE.TorusGeometry(1.04,.12,10,36),rm);r.rotation.x=Math.PI/2;r.position.set(0,y,0);g.add(r)});
  aM(new THREE.CylinderGeometry(2.22,1.95,.34,24),m,0,13.14,0,g);
}

function buildLight(g) {
  // Octagonal faceted crystal prism
  const m=new THREE.MeshStandardMaterial({color:0x101028,roughness:.2,metalness:.28,flatShading:true});
  const fm=new THREE.MeshStandardMaterial({color:0x1c1c3c,roughness:.12,metalness:.38,transparent:true,opacity:.82,flatShading:true});
  aM(new THREE.CylinderGeometry(2.42,2.82,.66,8),m,0,.33,0,g);
  aM(new THREE.CylinderGeometry(1.92,2.42,.38,8),m,0,.9,0,g);
  // Main octagonal shaft (flat shaded = natural crystalline facets)
  aM(new THREE.CylinderGeometry(1.12,1.46,11.5,8),m,0,6.9,0,g);
  // Crystal tetrahedron facets at 3 levels
  for(let lvl=0;lvl<3;lvl++){const yy=3.4+lvl*3.5;for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2+lvl*.22;const f=aM(new THREE.TetrahedronGeometry(.2),fm,Math.sin(a)*1.3,yy,Math.cos(a)*1.3,g);f.rotation.y=a;f.rotation.x=.42}}
  aM(new THREE.CylinderGeometry(1.46,1.12,.56,8),m,0,12.9,0,g);
  aM(new THREE.CylinderGeometry(1.82,1.46,.38,8),m,0,13.22,0,g);
}

function buildCrown(g) {
  const m=new THREE.MeshStandardMaterial({color:0x14102a,roughness:.78,metalness:.06});
  const am=new THREE.MeshStandardMaterial({color:0x201844,roughness:.65,metalness:.22});
  aM(new THREE.CylinderGeometry(2.82,3.22,.66,28),m,0,.33,0,g);
  aM(new THREE.CylinderGeometry(2.42,2.82,.38,28),m,0,.88,0,g);
  {const r=new THREE.Mesh(new THREE.TorusGeometry(2.52,.14,8,36),am);r.rotation.x=Math.PI/2;r.position.set(0,1.1,0);g.add(r)}
  // Stupa-tapered shaft
  const sp=[];for(let i=0;i<=28;i++){const t=i/28;sp.push(new THREE.Vector2(1.52*Math.pow(1-t,.43)+.44,1.08+t*11.2))}
  g.add(new THREE.Mesh(new THREE.LatheGeometry(sp,22),m));
  // Tiered parasol rings
  [3.4,5.4,7.4,9.4,10.9].forEach((y,j)=>{const r=2.2-j*.28;aM(new THREE.CylinderGeometry(r,r*1.07,.22,22),am,0,y,0,g)});
  aM(new THREE.CylinderGeometry(1.62,1.22,.38,22),m,0,12.28,0,g);
  // Lotus petals
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;const p=aM(new THREE.SphereGeometry(.48,8,6),am,Math.sin(a)*1.26,12.88,Math.cos(a)*1.26,g);p.scale.set(.38,1.28,.68);p.rotation.y=a;p.rotation.x=-.5}
  aM(new THREE.CylinderGeometry(1.82,1.62,.28,22),m,0,13.14,0,g);
}

const builders = [buildEarth,buildWater,buildFire,buildAir,buildSound,buildLight,buildCrown];

// ── OUTER PILLARS ───────────────────────────────────────────────
const pGrps=[],cMesh=[],angRays=[],atmRays=[],tLights=[],aLights=[],fMesh=[],fCore=[];

CK.forEach((ck,i)=>{
  const ang=(i/N)*Math.PI*2;
  const wx=Math.sin(ang)*OR, wz=Math.cos(ang)*OR;
  const col=new THREE.Color(ck.hex);

  const grp=new THREE.Group();grp.position.set(wx,0,wz);grp.userData.idx=i;scene.add(grp);pGrps.push(grp);

  // Build element-specific pillar
  builders[i](grp);

  // Crystal mount (common to all)
  const mnt=new THREE.Mesh(new THREE.TorusGeometry(.62,.11,10,32),new THREE.MeshStandardMaterial({color:0x3a2e1c,metalness:.55,roughness:.55}));
  mnt.rotation.x=Math.PI/2;mnt.position.set(0,13.84,0);grp.add(mnt);
  aM(new THREE.CylinderGeometry(.38,.48,.28,12),new THREE.MeshStandardMaterial({color:0x342a18,metalness:.5,roughness:.62}),0,13.66,0,grp);

  // Crystal gem
  const cry=aM(new THREE.OctahedronGeometry(.78,2),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:1.1,roughness:0,metalness:.14,transparent:true,opacity:.88}),0,14.72,0,grp);
  cry.scale.y=1.58;cMesh.push(cry);
  // Halo sphere
  aM(new THREE.SphereGeometry(1.22,14,10),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.09,blending:THREE.AdditiveBlending,depthWrite:false}),0,14.72,0,grp);
  // Dim ambient crystal light
  const dp=new THREE.PointLight(ck.hex,.38,10);dp.position.set(0,14.72,0);grp.add(dp);

  // ── ANGLED GOD RAY — tip at crystal, base fans over meditating figure ──
  const cryW=new THREE.Vector3(wx,14.72,wz);
  const figC=new THREE.Vector3(0,2.6,0);
  const rVec=cryW.clone().sub(figC);
  const rLen=rVec.length();
  const rDir=rVec.normalize();
  const aRay=new THREE.Mesh(new THREE.ConeGeometry(3.7,rLen,24,1,true),
    new THREE.MeshBasicMaterial({color:ck.hex,transparent:true,opacity:.055,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide}));
  aRay.position.copy(cryW.clone().lerp(figC,.5));
  aRay.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),rDir);
  scene.add(aRay);angRays.push(aRay);

  // Atmospheric fill ray — vertical, wide, very subtle (local group space)
  const cH=14.72, cY=cH/2;
  const atmRay=aM(new THREE.ConeGeometry(6.4,cH,20,1,true),
    new THREE.MeshBasicMaterial({color:ck.hex,transparent:true,opacity:.024,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide}),0,cY,0,grp);
  atmRays.push(atmRay);

  // Activation point light (world space)
  const al=new THREE.PointLight(ck.hex,0,58);al.position.set(wx,14.72,wz);scene.add(al);aLights.push(al);

  // Torch (inward-facing)
  const tx=-Math.sin(ang)*1.55, tz=-Math.cos(ang)*1.55;
  const tM=new THREE.MeshStandardMaterial({color:0x2a1a08,roughness:.9});
  aM(new THREE.CylinderGeometry(.065,.1,.7,8),tM,tx,13.9,tz,grp);
  aM(new THREE.CylinderGeometry(.18,.12,.22,10,1,true),new THREE.MeshStandardMaterial({color:0x4a3010,metalness:.38,roughness:.72}),tx,14.3,tz,grp);
  const fl=aM(new THREE.SphereGeometry(.22,8,7),new THREE.MeshBasicMaterial({color:0xFF8820,transparent:true,opacity:.88,blending:THREE.AdditiveBlending,depthWrite:false}),tx,14.54,tz,grp);fMesh.push(fl);
  const fc=aM(new THREE.SphereGeometry(.1,8,6),new THREE.MeshBasicMaterial({color:0xFFFF99,transparent:true,opacity:.92,blending:THREE.AdditiveBlending,depthWrite:false}),tx,14.65,tz,grp);fCore.push(fc);
  aM(new THREE.SphereGeometry(.44,8,6),new THREE.MeshBasicMaterial({color:0xFF6600,transparent:true,opacity:.1,blending:THREE.AdditiveBlending,depthWrite:false}),tx,14.54,tz,grp);
  const tl=new THREE.PointLight(0xFF9933,2.9,15);tl.position.set(tx,14.65,tz);grp.add(tl);tLights.push(tl);
});

// ── STALACTITES ─────────────────────────────────────────────────
{const sm=new THREE.MeshStandardMaterial({color:0x0b0912,roughness:1});
for(let i=0;i<42;i++){const a=Math.random()*Math.PI*2,r=4+Math.random()*34,h=1+Math.random()*9.5,rt=.1+Math.random()*.58;
const m=new THREE.Mesh(new THREE.ConeGeometry(rt,h,6),sm);m.position.set(Math.sin(a)*r,29-h/2,Math.cos(a)*r);m.rotation.z=(Math.random()-.5)*.2;scene.add(m)}}

// ── WATERFALLS — 3 particle streams ─────────────────────────────
const WF_N=180;
const wfData=[{x:28,z:8},{x:-18,z:22},{x:-26,z:-13}];
const wfAttrs=[],wfPosArr=[],wfVels=[];
wfData.forEach(({x,z})=>{
  const pos=new Float32Array(WF_N*3),vel=new Float32Array(WF_N);
  for(let i=0;i<WF_N;i++){const a=Math.random()*Math.PI*2,r=Math.random()*.68;pos[i*3]=x+Math.cos(a)*r;pos[i*3+1]=Math.random()*24;pos[i*3+2]=z+Math.sin(a)*r;vel[i]=.09+Math.random()*.14}
  const geo=new THREE.BufferGeometry(),attr=new THREE.BufferAttribute(pos,3);geo.setAttribute('position',attr);
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0x99CCFF,size:.07,transparent:true,opacity:.26,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true})));
  wfAttrs.push(attr);wfPosArr.push(pos);wfVels.push(vel);
  const wfl=new THREE.PointLight(0x44AADD,.55,9);wfl.position.set(x,.5,z);scene.add(wfl);
});

// ── DUST MOTES ──────────────────────────────────────────────────
const DN=700,dP=new Float32Array(DN*3);
for(let i=0;i<DN;i++){const a=Math.random()*Math.PI*2,r=Math.sqrt(Math.random())*36;dP[i*3]=Math.sin(a)*r;dP[i*3+1]=Math.random()*26;dP[i*3+2]=Math.cos(a)*r}
const dGeo=new THREE.BufferGeometry(),dAttr=new THREE.BufferAttribute(dP,3);dGeo.setAttribute('position',dAttr);
scene.add(new THREE.Points(dGeo,new THREE.PointsMaterial({color:0xAABBCC,size:.042,transparent:true,opacity:.16,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true})));

// ── UI BUTTONS ──────────────────────────────────────────────────
const btnsD=document.getElementById('btns');
CK.forEach((ck,i)=>{const b=document.createElement('div');b.className='cbtn';b.style.cssText=`background:${ck.css};box-shadow:0 0 16px ${ck.css}44;color:${ck.css}`;b.title=`${ck.name} · ${ck.freq}Hz · ${ck.el}`;b.addEventListener('click',()=>activate(i));btnsD.appendChild(b)});

// ── ACTIVATION ──────────────────────────────────────────────────
let aIdx=-1;
const wTgts=CK.map(ck=>{const c=new THREE.Color(ck.hex);c.multiplyScalar(.12);return c});
const wDef=new THREE.Color(0x002e4a);
const tEl=document.getElementById('hTitle'),sEl=document.getElementById('hSub');

function activate(idx){
  if(aIdx===idx){deact();return}
  aIdx=idx;const ck=CK[idx];
  tEl.textContent=`${ck.name.toUpperCase()} CHAKRA`;tEl.style.color=ck.css;
  sEl.textContent=`${ck.sk}  ·  ${ck.freq} Hz  ·  ${ck.el}  ·  ${ck.mantra}`;sEl.style.color=ck.css;
  document.querySelectorAll('.cbtn').forEach((b,j)=>b.classList.toggle('on',j===idx));
  aLights.forEach((l,j)=>{l.intensity=j===idx?5.2:0});
  auM1.color.set(ck.hex);auM2.color.set(ck.hex);
  poolMat.color.set(ck.hex);cLight.color.set(ck.hex);wGlow.color.set(ck.hex);
  if(sndOn){iA();playA(ck.freq)}
}
function deact(){
  aIdx=-1;
  tEl.textContent='Sacred Chamber';tEl.style.color='#fff';
  sEl.textContent='Select a crystal pillar to begin';sEl.style.color='rgba(200,220,255,.42)';
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('on'));
  aLights.forEach(l=>l.intensity=0);cLight.intensity=0;
  wGlow.color.set(0x002244);if(sndOn)stopA();
}

// ── RAYCASTING ──────────────────────────────────────────────────
const rc=new THREE.Raycaster(),mn=new THREE.Vector2();
const rcT=[];pGrps.forEach(g=>g.traverse(c=>{if(c.isMesh)rcT.push(c)}));
const findG=o=>{while(o){if(pGrps.includes(o))return o;o=o.parent}return null};
el.addEventListener('click',e=>{
  if(Math.abs(e.clientX-mD[0])>8||Math.abs(e.clientY-mD[1])>8)return;
  mn.set((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);rc.setFromCamera(mn,cam);
  const g=findG(rc.intersectObjects(rcT)[0]?.object);if(g)activate(g.userData.idx)});
const tipEl=document.getElementById('tip');
el.addEventListener('mousemove',e=>{
  if(drag){tipEl.style.display='none';return}
  mn.set((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);rc.setFromCamera(mn,cam);
  const g=findG(rc.intersectObjects(rcT)[0]?.object);
  if(g){const ck=CK[g.userData.idx];tipEl.textContent=`${ck.name}  ·  ${ck.el}  ·  ${ck.mantra}  ·  ${ck.freq}Hz`;tipEl.style.color=ck.css;tipEl.style.borderColor=ck.css+'44';tipEl.style.left=(e.clientX+16)+'px';tipEl.style.top=(e.clientY-22)+'px';tipEl.style.display='block';el.style.cursor='pointer'}
  else{tipEl.style.display='none';el.style.cursor='default'}
});

// ── ANIMATION LOOP ──────────────────────────────────────────────
const clock=new THREE.Clock();
(function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  // Water
  wUni.uTime.value=t;dWUni.uTime.value=t*.58;
  wUni.uColor.value.lerp(aIdx>=0?wTgts[aIdx]:wDef,.02);

  // Torch flicker
  tLights.forEach((l,i)=>l.intensity=2.9*(1+.38*Math.sin(t*8.8+i*2.3)+.16*Math.sin(t*17.2+i*3.7)));
  fMesh.forEach((f,i)=>{const s=.72+.44*Math.sin(t*9.5+i*2.9)+.18*Math.sin(t*18.1+i*1.4);f.scale.setScalar(s);f.position.y=14.54+.11*Math.sin(t*12.2+i*3.1)});
  fCore.forEach((f,i)=>f.position.y=14.65+.12*Math.sin(t*13.6+i*2.2));

  // Crystal spin + glow
  cMesh.forEach((c,i)=>{c.rotation.y=t*.44+(i/N)*Math.PI*2;c.material.emissiveIntensity=i===aIdx?2.8*(1+.4*Math.sin(t*4.0)):(.58+.22*Math.sin(t*.82+i*.95))});

  // Angled god rays — converge on figure
  angRays.forEach((r,i)=>r.material.opacity=i===aIdx?.14+.08*Math.sin(t*4.0):.052+.018*Math.sin(t*.6+i*.82));
  // Atmospheric fill rays
  atmRays.forEach((r,i)=>r.material.opacity=i===aIdx?.042+.02*Math.sin(t*4.0):.02+.008*Math.sin(t*.5+i*.72));

  // Active chakra
  if(aIdx>=0){
    const ck=CK[aIdx],pulse=Math.sin(t*4.0);
    aLights[aIdx].intensity=5.2*(1+.44*pulse);
    cLight.intensity=2.0*(1+.42*pulse);
    wGlow.intensity=.65+.32*Math.abs(pulse);
    poolMat.opacity=.2+.11*Math.abs(pulse);
    auM1.opacity=.3+.18*pulse;
    auM2.opacity=.14+.08*Math.sin(t*4.0+.65);
    islMat.emissive.set(ck.hex);
    const af=1+3*(ck.freq-396)/(963-396);
    islMat.emissiveIntensity=.07+.05*Math.sin(t*Math.PI*2*af);
    auR1.rotation.z=t*.12;auR2.rotation.z=-t*.09;
  } else {
    islMat.emissiveIntensity=Math.max(0,islMat.emissiveIntensity*.93);
    poolMat.opacity=Math.max(0,poolMat.opacity-.014);
    auM1.opacity=Math.max(0,auM1.opacity-.016);
    auM2.opacity=Math.max(0,auM2.opacity-.009);
    cLight.intensity=Math.max(0,cLight.intensity*.91);
    wGlow.intensity=Math.max(.55,wGlow.intensity*.95);
  }

  // Waterfall particles
  wfPosArr.forEach((pos,wi)=>{
    const vel=wfVels[wi],{x,z}=wfData[wi];
    for(let i=0;i<WF_N;i++){pos[i*3+1]-=vel[i];if(pos[i*3+1]<.04){const a=Math.random()*Math.PI*2,r=Math.random()*.68;pos[i*3]=x+Math.cos(a)*r;pos[i*3+1]=20+Math.random()*5;pos[i*3+2]=z+Math.sin(a)*r}}
    wfAttrs[wi].needsUpdate=true;
  });

  // Dust motes drift upward
  for(let i=0;i<DN;i++){dP[i*3+1]+=.0034;if(dP[i*3+1]>26)dP[i*3+1]=0}
  dAttr.needsUpdate=true;

  // Auto-orbit
  if(!drag){cTh+=.00015;reC()}

  renderer.render(scene,cam);
})();

// ── RESIZE ──────────────────────────────────────────────────────
window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});

// ── LOADING SCREEN FADE ──────────────────────────────────────────
setTimeout(()=>{const l=document.getElementById('load');l.classList.add('out');setTimeout(()=>l.remove(),1300)},1200);
</script>
